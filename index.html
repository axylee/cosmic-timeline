<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宇宙歷史時間軸 · Cosmic Timeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050810;
  --bg2: #0a0e1a;
  --text: #ddd8c8;
  --text-muted: rgba(221,216,200,0.45);
  --axis-color: rgba(255,255,255,0.15);
  --cosmos:   #a78bfa;
  --earth:    #60a5fa;
  --life:     #34d399;
  --human:    #fbbf24;
  --east:     #f87171;
  --west:     #c084fc;
  --cross:    #e2e8f0;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  overflow: hidden;
  height: 100vh;
  cursor: crosshair;
  user-select: none;
}

/* ─── STARS ─── */
#stars-canvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}

/* ─── HEADER ─── */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  padding: 16px 28px 12px;
  background: linear-gradient(to bottom, rgba(5,8,16,0.97) 60%, transparent);
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px;
}
#header h1 {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 14px; font-weight: 700;
  letter-spacing: 0.18em; color: var(--text);
  white-space: nowrap;
}
#header p {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 10px; letter-spacing: 0.15em;
  color: var(--text-muted);
}

/* ─── AXIS LEGEND ─── */
#legend {
  position: fixed; top: 54px; left: 0; right: 0; z-index: 49;
  display: flex; align-items: center; justify-content: center; gap: 18px;
  padding: 6px 24px;
  background: linear-gradient(to bottom, rgba(5,8,16,0.6) 0%, transparent);
}
.leg {
  display: flex; align-items: center; gap: 5px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 10px; letter-spacing: 0.05em;
  color: var(--text-muted); opacity: 0.85;
  cursor: pointer; transition: opacity .2s;
}
.leg:hover { opacity: 1; }
.leg-sub {
  font-size: 9px; opacity: 0.45;
}
.leg-dot {
  width: 7px; height: 7px; border-radius: 50%;
  flex-shrink: 0;
}
.leg-sub .leg-dot { width: 5px; height: 5px; }
#legend-zoom-hint {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 8px; color: rgba(221,216,200,0.2);
  letter-spacing: 0.05em; padding: 0 4px;
  pointer-events: none;
}

/* ─── MAIN CANVAS ─── */
#timeline-canvas {
  position: fixed; inset: 0; z-index: 10;
  display: block;
}

/* ─── TIME DISPLAY ─── */
#time-display {
  position: fixed; bottom: 56px; left: 50%; transform: translateX(-50%);
  z-index: 50;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 11px; letter-spacing: 0.12em;
  color: var(--text-muted);
  background: rgba(5,8,16,0.75);
  border: 1px solid rgba(255,255,255,0.07);
  padding: 5px 16px; border-radius: 20px;
  pointer-events: none;
  backdrop-filter: blur(6px);
  white-space: nowrap;
}

/* ─── SCALE BAR ─── */
#scale-bar {
  position: fixed; bottom: 68px; left: 20px; z-index: 50;
  display: flex; flex-direction: column; gap: 4px;
  pointer-events: none;
}
#scale-label {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 10px; color: rgba(221,216,200,0.45);
  letter-spacing: 0.08em; margin-bottom: 2px;
}
#scale-line-wrap { display: flex; align-items: center; }
.scale-cap { width: 1px; height: 8px; background: rgba(221,216,200,0.35); display: inline-block; }
#scale-line { height: 2px; background: rgba(221,216,200,0.35); display: inline-block; }

/* ─── RIGHT PANEL: V-zoom + V-scrollbar ─── */
#right-panel {
  position: fixed; right: 0; top: 80px; bottom: 80px;
  width: 36px; z-index: 50;
  display: flex; flex-direction: column; align-items: center;
  gap: 0;
  background: rgba(5,8,16,0.75);
  border-left: 1px solid rgba(255,255,255,0.07);
  backdrop-filter: blur(8px);
}

/* V-zoom slider top portion */
#vzoom-wrap {
  display: flex; flex-direction: column; align-items: center;
  gap: 4px; padding: 8px 0;
  flex: 0 0 auto;
}
.vpanel-label {
  font-size: 11px; color: rgba(221,216,200,0.35);
  line-height: 1; user-select: none;
}
#yzoom-slider {
  -webkit-appearance: slider-vertical;
  appearance: slider-vertical;
  writing-mode: vertical-lr;
  direction: rtl;
  width: 6px;
  cursor: pointer;
  accent-color: rgba(96,165,250,0.7);
  background: transparent;
}
.vpanel-divider {
  width: 20px; height: 1px;
  background: rgba(255,255,255,0.1);
  margin: 4px 0; flex-shrink: 0;
}

/* V-scrollbar lower portion */
#vscroll-wrap {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; padding: 4px 0; min-height: 0;
}
#vscroll-track {
  flex: 1; width: 6px; position: relative;
  background: rgba(255,255,255,0.07);
  border-radius: 3px; cursor: pointer;
  min-height: 40px;
}
#vscroll-thumb {
  position: absolute; left: 0; width: 100%;
  background: rgba(255,255,255,0.22);
  border-radius: 3px; cursor: grab; min-height: 20px;
  transition: background .15s;
}
#vscroll-thumb:hover { background: rgba(255,255,255,0.38); }
#vscroll-thumb.dragging { background: rgba(96,165,250,0.6); cursor: grabbing; }

/* Reset button */
#btn-reset {
  width: 26px; height: 26px; flex-shrink: 0;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 50%; cursor: pointer;
  color: rgba(221,216,200,0.4); font-size: 12px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; margin: 6px 0;
}
#btn-reset:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }

/* ─── BOTTOM BAR: H-scrollbar + H-zoom + era jumps ─── */
#bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 36px;
  height: 88px; z-index: 50;
  display: flex; flex-direction: column; align-items: stretch;
  padding: 0 20px;
  background: linear-gradient(to top, rgba(5,8,16,0.97) 80%, transparent);
  gap: 5px; justify-content: flex-end; padding-bottom: 8px;
}

/* Era jump buttons row */
#era-jumps {
  display: flex; align-items: center; justify-content: center;
  gap: 5px; flex-wrap: nowrap; overflow-x: auto;
}
.era-btn {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 10px; font-weight: 500;
  padding: 3px 10px; border-radius: 12px;
  border: 1px solid; cursor: pointer;
  background: transparent;
  transition: all .15s; white-space: nowrap;
  opacity: 0.65;
}
.era-btn:hover { opacity: 1; filter: brightness(1.3); }

/* H scrollbar row */
#hscroll-row {
  display: flex; align-items: center; gap: 8px;
}
#scrollbar-track {
  position: relative; flex: 1; height: 6px;
  background: rgba(255,255,255,0.07);
  border-radius: 3px; cursor: pointer;
}
#scrollbar-thumb {
  position: absolute; top: 0; height: 100%;
  background: rgba(255,255,255,0.22);
  border-radius: 3px; cursor: grab; min-width: 24px;
  transition: background .15s;
}
#scrollbar-thumb:hover { background: rgba(255,255,255,0.38); }
#scrollbar-thumb.dragging { background: rgba(167,139,250,0.6); cursor: grabbing; }

/* H zoom slider row — centred, 2× wider */
#hzoom-row {
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.hzoom-label {
  font-size: 12px; color: rgba(221,216,200,0.35);
  user-select: none; line-height: 1;
}
#zoom-slider {
  width: 280px; height: 4px;
  cursor: pointer;
  accent-color: rgba(167,139,250,0.8);
  -webkit-appearance: auto;
  appearance: auto;
}

/* ─── TOOLTIP ─── */
#tooltip {
  position: fixed; z-index: 200;
  pointer-events: none;
  opacity: 0; transition: opacity .18s;
  max-width: 220px;
  transform: translateY(-4px);
}
#tooltip.show { opacity: 1; transform: translateY(0); }
.tt-box {
  background: rgba(5,8,16,0.95);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px; padding: 10px 13px;
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
.tt-era {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 9px; letter-spacing: 0.12em;
  text-transform: uppercase; margin-bottom: 5px;
}
.tt-zh { font-size: 14px; font-weight: 500; margin-bottom: 1px; line-height: 1.3; }
.tt-en { font-size: 10px; color: var(--text-muted); margin-bottom: 6px; }
.tt-time { font-family: 'Noto Sans TC', sans-serif; font-size: 9px; color: var(--text-muted); }

/* ─── POPUP ─── */
#popup-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(5,8,16,0.7);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .25s;
}
#popup-overlay.show { opacity: 1; pointer-events: all; }
#popup {
  background: rgba(10,14,26,0.98);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 14px;
  width: min(560px, 92vw);
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 24px 80px rgba(0,0,0,0.8);
  transform: translateY(12px) scale(0.97);
  transition: transform .25s;
}
#popup-overlay.show #popup { transform: translateY(0) scale(1); }

.popup-img {
  width: 100%; height: 220px; object-fit: cover;
  border-radius: 13px 13px 0 0;
  background: #0a0e1a;
  display: block;
}
.popup-img-placeholder {
  width: 100%; height: 220px;
  border-radius: 13px 13px 0 0;
  background: linear-gradient(135deg, #0a0e1a 0%, #131929 100%);
  display: flex; align-items: center; justify-content: center;
}
.popup-img-placeholder svg { opacity: 0.15; }

.popup-body { padding: 20px 24px 24px; }
.popup-axis-tag {
  display: inline-block; margin-bottom: 12px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  padding: 3px 9px; border-radius: 12px;
  border: 1px solid;
}
.popup-title-zh {
  font-size: 22px; font-weight: 500;
  line-height: 1.3; margin-bottom: 3px;
}
.popup-title-en {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 14px;
}
.popup-time {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 10px; color: var(--text-muted);
  margin-bottom: 14px;
  padding-bottom: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}
.popup-desc-zh { font-size: 14px; line-height: 1.9; margin-bottom: 8px; }
.popup-desc-en { font-size: 12px; line-height: 1.8; color: var(--text-muted); margin-bottom: 20px; }
.popup-links {
  display: flex; gap: 10px; flex-wrap: wrap;
}
.popup-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 11px; letter-spacing: 0.05em;
  color: var(--text-muted);
  border: 1px solid rgba(255,255,255,0.12);
  padding: 6px 14px; border-radius: 20px;
  text-decoration: none; cursor: pointer;
  transition: all .2s; background: transparent;
}
.popup-link:hover {
  color: var(--text); border-color: rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.05);
}
.popup-close {
  position: absolute; top: 14px; right: 14px;
  width: 30px; height: 30px;
  background: rgba(5,8,16,0.8); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); font-size: 14px;
  transition: all .2s; z-index: 10;
  font-family: monospace;
}
.popup-close:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }
#popup-overlay { position: fixed; }
#popup { position: relative; }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<div id="header">
  <h1>COSMIC TIMELINE · 宇宙歷史時間軸</h1>
  <p>138億年 · 13.8 BILLION YEARS</p>
</div>

<div id="legend">
  <div class="leg" data-axis="cosmos"><div class="leg-dot" style="background:#a78bfa"></div>宇宙</div>
  <div class="leg" data-axis="earth"><div class="leg-dot" style="background:#60a5fa"></div>地球</div>
  <div class="leg" data-axis="life"><div class="leg-dot" style="background:#34d399"></div>生命</div>
  <div class="leg" data-axis="human-evo"><div class="leg-dot" style="background:#fbbf24"></div>人類演化</div>
  <div class="leg" data-axis="cross"><div class="leg-dot" style="background:#e2e8f0"></div>跨文明</div>
  <div class="leg" data-axis="east"><div class="leg-dot" style="background:#f87171"></div>東方</div>
  <div class="leg" data-axis="west"><div class="leg-dot" style="background:#c084fc"></div>西方</div>
  <span id="legend-zoom-hint">← zoom in 展開子軸</span>
  <div class="leg leg-sub" data-axis="china"><div class="leg-dot" style="background:#fca5a5"></div>中國</div>
  <div class="leg leg-sub" data-axis="taiwan"><div class="leg-dot" style="background:#f9a8d4"></div>臺灣</div>
  <div class="leg leg-sub" data-axis="japan"><div class="leg-dot" style="background:#fdba74"></div>日本</div>
  <div class="leg leg-sub" data-axis="mideast"><div class="leg-dot" style="background:#fde68a"></div>中東</div>
  <div class="leg leg-sub" data-axis="india"><div class="leg-dot" style="background:#86efac"></div>印度</div>
  <div class="leg leg-sub" data-axis="greece"><div class="leg-dot" style="background:#c4b5fd"></div>希臘羅馬</div>
  <div class="leg leg-sub" data-axis="europe"><div class="leg-dot" style="background:#a5b4fc"></div>歐洲</div>
  <div class="leg leg-sub" data-axis="americas"><div class="leg-dot" style="background:#93c5fd"></div>美洲</div>
</div>

<canvas id="timeline-canvas"></canvas>

<div id="time-display">— —</div>

<!-- Scale bar bottom-left -->
<div id="scale-bar">
  <div id="scale-label">— —</div>
  <div id="scale-line-wrap">
    <div class="scale-cap"></div>
    <div id="scale-line"></div>
    <div class="scale-cap"></div>
  </div>
</div>

<!-- Right panel: V-zoom slider + V-scrollbar -->
<div id="right-panel">
  <div id="vzoom-wrap">
    <div class="vpanel-label">＋</div>
    <input type="range" id="yzoom-slider" min="10" max="400" value="100"
           orient="vertical" style="writing-mode:vertical-lr;direction:rtl;height:140px;">
    <div class="vpanel-label">−</div>
  </div>
  <div class="vpanel-divider"></div>
  <div id="vscroll-wrap">
    <div id="vscroll-track">
      <div id="vscroll-thumb"></div>
    </div>
  </div>
  <button id="btn-reset" title="全覽">⊙</button>
</div>

<!-- Bottom bar: era jumps + H-scrollbar + H-zoom slider -->
<div id="bottom-bar">
  <div id="era-jumps">
    <button class="era-btn" style="color:#a78bfa;border-color:#a78bfa55" data-start="-13800000000" data-end="-4000000000">宇宙誕生</button>
    <button class="era-btn" style="color:#60a5fa;border-color:#60a5fa55" data-start="-4600000000" data-end="-500000000">地球生命</button>
    <button class="era-btn" style="color:#34d399;border-color:#34d39955" data-start="-250000000" data-end="-50000000">恐龍時代</button>
    <button class="era-btn" style="color:#fbbf24;border-color:#fbbf2455" data-start="-4000000" data-end="-100000">人類演化</button>
    <button class="era-btn" style="color:#e2e8f0;border-color:#e2e8f055" data-start="-12000" data-end="500">史前文明</button>
    <button class="era-btn" style="color:#fde68a;border-color:#fde68a55" data-start="-3500" data-end="-500">古代東方</button>
    <button class="era-btn" style="color:#c4b5fd;border-color:#c4b5fd55" data-start="-800" data-end="500">古典西方</button>
    <button class="era-btn" style="color:#a5b4fc;border-color:#a5b4fc55" data-start="500" data-end="1500">中世紀</button>
    <button class="era-btn" style="color:#c084fc;border-color:#c084fc55" data-start="1400" data-end="1800">文藝復興</button>
    <button class="era-btn" style="color:#93c5fd;border-color:#93c5fd55" data-start="1750" data-end="1950">工業革命</button>
    <button class="era-btn" style="color:#e2e8f0;border-color:#e2e8f055" data-start="1900" data-end="2030">現代</button>
  </div>
  <div id="hscroll-row">
    <div id="scrollbar-track">
      <div id="scrollbar-thumb"></div>
    </div>
  </div>
  <div id="hzoom-row">
    <span class="hzoom-label">−</span>
    <input type="range" id="zoom-slider" min="0" max="100" value="5">
    <span class="hzoom-label">＋</span>
  </div>
</div>

<div id="tooltip">
  <div class="tt-box">
    <div class="tt-era" id="tt-era"></div>
    <div class="tt-zh" id="tt-zh"></div>
    <div class="tt-en" id="tt-en"></div>
    <div class="tt-time" id="tt-time"></div>
  </div>
</div>

<div id="popup-overlay">
  <div id="popup">
    <button class="popup-close" id="popup-close">✕</button>
    <div id="popup-img-wrap"></div>
    <div class="popup-body">
      <div class="popup-axis-tag" id="popup-tag"></div>
      <div class="popup-title-zh" id="popup-zh"></div>
      <div class="popup-title-en" id="popup-en"></div>
      <div class="popup-time" id="popup-time"></div>
      <div class="popup-desc-zh" id="popup-desc-zh"></div>
      <div class="popup-desc-en" id="popup-desc-en"></div>
      <div class="popup-links" id="popup-links"></div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════
//  CONSTANTS & CONFIG
// ════════════════════════════════════════════
const TOTAL_YEARS = 13_800_000_000;
const NOW         = 2026;
const FUTURE_END  = NOW + 500;        // 右邊硬邊界
const TIMELINE_START = -TOTAL_YEARS;
const TIMELINE_END   = FUTURE_END;

// ════════════════════════════════════════════
//  AXIS TREE
//  order   : 全局排序（越小越靠上），同父軸按 startYear 自動排
//  endYear : 文明消失年份（null = 延續至今）
//  zoomMin : 子軸出現最低 zoom
//  parent  : 父軸 id（null = 根軸）
// ════════════════════════════════════════════
const AXES = {
  // ── 主幹 ── (zoomMin:0 = 永遠顯示)
  cosmos:    { color:'#a78bfa', label:'宇宙',     startYear:-13800000000, endYear:null,  parent:null,        order: 0,  zoomMin:0    },
  earth:     { color:'#60a5fa', label:'地球',     startYear:-4540000000,  endYear:null,  parent:'cosmos',    order: 1,  zoomMin:0    },
  life:      { color:'#34d399', label:'生命',     startYear:-3800000000,  endYear:null,  parent:'earth',     order: 2,  zoomMin:0    },
  'human-evo':{ color:'#fbbf24', label:'人類演化', startYear:-4000000,    endYear:null,  parent:'life',      order: 3,  zoomMin:0    },
  cross:     { color:'#e2e8f0', label:'跨文明',   startYear:-10000,       endYear:null,  parent:'human-evo', order: 4,  zoomMin:0    },

  // ── 東方文明 + 子軸（order 按 startYear 早→晚從上到下）──
  east:      { color:'#f87171', label:'東方文明', startYear:-3500,        endYear:null,  parent:'cross',     order: 5,  zoomMin:0    },
  mideast:   { color:'#fde68a', label:'中東',     startYear:-3500,        endYear:null,  parent:'east',      order: 6,  zoomMin:0.58 },
  india:     { color:'#86efac', label:'印度',     startYear:-2600,        endYear:null,  parent:'east',      order: 7,  zoomMin:0.58 },
  china:     { color:'#fca5a5', label:'中國',     startYear:-2070,        endYear:null,  parent:'east',      order: 8,  zoomMin:0.58 },
  // 中國並立政權子軸（zoom 更深才顯示，用於春秋戰國/三國/五代十國等分裂時期）
  'china-b': { color:'#fb923c', label:'並立政權', startYear:-771,         endYear:null,  parent:'china',     order: 9,  zoomMin:0.75 },
  taiwan:    { color:'#f9a8d4', label:'臺灣',     startYear:-30000,       endYear:null,  parent:'east',      order:10,  zoomMin:0.58 },
  japan:     { color:'#fdba74', label:'日本',     startYear:-300,         endYear:null,  parent:'east',      order:11,  zoomMin:0.58 },

  // ── 西方文明 + 子軸 ──
  west:      { color:'#c084fc', label:'西方文明', startYear:-3500,        endYear:null,  parent:'cross',     order:12,  zoomMin:0    },
  greece:    { color:'#c4b5fd', label:'希臘羅馬', startYear:-800,         endYear:476,   parent:'west',      order:13,  zoomMin:0.58 },
  europe:    { color:'#a5b4fc', label:'歐洲',     startYear:500,          endYear:null,  parent:'west',      order:14,  zoomMin:0.58 },
  americas:  { color:'#93c5fd', label:'美洲',     startYear:1492,         endYear:null,  parent:'west',      order:15,  zoomMin:0.58 },
};

// ── 間距常數 ──
const LANE_GAP_BASE = 54;   // 預設每條軸的高度間距（px）
const TOP_MARGIN    = 138;  // 頂部保留給時代標籤

// ── 計算可見軸清單（已排序）──
// 如果目前視窗右邊界超過 endYear，且 zoom 夠深看到子軸層，就隱藏該已消亡文明
function getVisibleAxes() {
  const zoom = currentZoom();
  // 當 zoom 夠深（子軸可見），用 viewEnd 判斷文明是否已消亡
  const checkEnd = zoom >= 0.58;

  return Object.entries(AXES)
    .filter(([id, ax]) => {
      if (hiddenAxes.has(id)) return false;
      // 子軸 zoom 門檻
      if (ax.zoomMin > 0 && zoom < ax.zoomMin) return false;
      // 消亡判斷：zoom 夠深 + 有 endYear + 視窗左邊界已超過 endYear → 隱藏
      if (checkEnd && ax.endYear != null && viewStart > ax.endYear + 50) return false;
      return true;
    })
    .sort((a, b) => a[1].order - b[1].order);
}

// ── 子軸 fade-in alpha（zoom 超過 zoomMin 後漸入）──
function subAxisAlpha(ax) {
  if (ax.zoomMin === 0) return 1;
  return Math.min(1, (currentZoom() - ax.zoomMin) / 0.06);
}

// ── 人類演化線 fade-out（子文明出現後逐漸淡化）──
function humanEvoAlpha() {
  const zoom = currentZoom();
  // 完全淡出在 zoom > 0.72
  if (zoom < 0.58) return 1;
  if (zoom > 0.72) return 0.15;
  return 1 - (zoom - 0.58) / 0.14 * 0.85;
}

// ── 每幀計算 axis Y 位置（cache by frame）──
let _axisYCache = new Map();
let _axisYFrame = -1;
let _frameCounter = 0;

function getAxisYMap() {
  if (_axisYFrame === _frameCounter) return _axisYCache;
  const vis = getVisibleAxes();
  const gap = LANE_GAP_BASE * Math.max(1, yScale);
  const map = new Map();
  vis.forEach(([id], i) => {
    map.set(id, TOP_MARGIN + i * gap + yOffset);
  });
  _axisYCache = map;
  _axisYFrame = _frameCounter;
  return map;
}

function getAxisY(id) {
  return getAxisYMap().get(id) ?? (canvasH * 0.5 + yOffset);
}

// Events always sit exactly ON their axis line — sub_track ignored
function axisY(axisId, subtrack = 0) {
  return getAxisY(axisId);
}

function contentHeight() {
  const n = getVisibleAxes().length;
  const gap = LANE_GAP_BASE * Math.max(1, yScale);
  return TOP_MARGIN + n * gap + 100;
}
// ════════════════════════════════════════════
let events = [];
let viewStart = TIMELINE_START;
let viewEnd   = NOW + 100;   // 初始顯示到今日，不顯示未來區
let yScale    = 1.0;
let yOffset   = 0;
let isDragging    = false;
let dragStartX    = 0;
let dragStartY    = 0;
let dragViewStart = 0;
let dragYOffset   = 0;
let hoveredEvent = null;
let mouseX = -1, mouseY = -1;
let canvasW = 0, canvasH = 0;
let dpr = window.devicePixelRatio || 1;
let hiddenAxes = new Set();
let lastFrameTime = 0;
// _frameCounter declared above in AXES section
const starsCanvas = document.getElementById('stars-canvas');
const starsCtx = starsCanvas.getContext('2d');
const canvas = document.getElementById('timeline-canvas');
const ctx = canvas.getContext('2d');

function resize() {
  dpr = window.devicePixelRatio || 1;
  canvasW = window.innerWidth;
  canvasH = window.innerHeight;
  canvas.width  = canvasW * dpr;
  canvas.height = canvasH * dpr;
  canvas.style.width  = canvasW + 'px';
  canvas.style.height = canvasH + 'px';
  ctx.scale(dpr, dpr);
  starsCanvas.width  = canvasW * dpr;
  starsCanvas.height = canvasH * dpr;
  starsCanvas.style.width  = canvasW + 'px';
  starsCanvas.style.height = canvasH + 'px';
  starsCtx.scale(dpr, dpr);
  drawStars();
}

// ════════════════════════════════════════════
//  STARS BACKGROUND
// ════════════════════════════════════════════
function drawStars() {
  starsCtx.clearRect(0, 0, canvasW, canvasH);
  const rng = mulberry32(42);
  for (let i = 0; i < 320; i++) {
    const x = rng() * canvasW;
    const y = rng() * canvasH;
    const r = rng() * 1.1 + 0.2;
    const a = rng() * 0.5 + 0.1;
    starsCtx.beginPath();
    starsCtx.arc(x, y, r, 0, Math.PI * 2);
    starsCtx.fillStyle = `rgba(255,255,255,${a})`;
    starsCtx.fill();
  }
}
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ════════════════════════════════════════════
//  COORDINATE HELPERS
// ════════════════════════════════════════════
function yearToX(year) {
  return ((year - viewStart) / (viewEnd - viewStart)) * canvasW;
}
function xToYear(x) {
  return viewStart + (x / canvasW) * (viewEnd - viewStart);
}
// ════════════════════════════════════════════
//  ZOOM LEVEL → event visibility
// ════════════════════════════════════════════
function currentZoom() {
  // 0 = fully zoomed out (138B yrs), 1 = max zoom
  const span = viewEnd - viewStart;
  const maxSpan = TOTAL_YEARS + NOW;
  return 1 - Math.log(span) / Math.log(maxSpan);
}
function eventVisible(ev) {
  const zoom = currentZoom();
  const ax = AXES[ev.axis];
  if (!ax) return false;
  if (hiddenAxes.has(ev.axis)) return false;
  if (ax.zoomMin > 0 && zoom < ax.zoomMin) return false;
  const checkEnd = zoom >= 0.58;
  if (checkEnd && ax.endYear != null && viewStart > ax.endYear + 50) return false;
  if (ev.level === 1) return true;
  // Level 2: show when span < 10 billion years (reasonable zoom for geological scale)
  if (ev.level === 2) return zoom > 0.10;
  if (ev.level === 3) return zoom > 0.55;
  return zoom > 0.7;
}
function dotRadius(ev) {
  const zoom = currentZoom();
  const base = ev.level === 1 ? 6 : ev.level === 2 ? 4.5 : 3;
  return base + zoom * 2;
}
function contentHeight() {
  const visCount = getVisibleAxes().length;
  const gap = LANE_GAP_BASE * Math.max(1, yScale);
  return TOP_MARGIN + visCount * gap + 80;
}

// ════════════════════════════════════════════
//  FORMAT YEAR
// ════════════════════════════════════════════
function formatYear(y) {
  const abs = Math.abs(y);
  if (y < 0) {
    if (abs >= 100_000_000) {           // ≥ 1億 → 億年前
      const v = abs / 1e9;              // in units of 10億
      const yi = abs / 1e8;             // in units of 1億
      // 138億: yi=138 → "138億", 13.8億: yi=13.8 → "13.8億", 5.4億: yi=5.4 → "5.4億"
      return (yi >= 100 ? yi.toFixed(0) : yi >= 10 ? yi.toFixed(1) : yi.toFixed(2)) + ' 億年前';
    }
    if (abs >= 10_000_000)   return (abs / 1e6).toFixed(0) + ' 百萬年前';
    if (abs >= 1_000_000)    return (abs / 1e6).toFixed(1) + ' 百萬年前';
    if (abs >= 10_000)       return (abs / 10000).toFixed(1) + ' 萬年前';
    if (abs >= 1_000)        return Math.round(abs / 1000) + ' 千年前';
    return `西元前 ${Math.round(abs)} 年`;
  }
  if (y === 0) return '西元元年';
  if (y > NOW) return `西元 ${Math.round(y)} 年（未來）`;
  return `西元 ${Math.round(y)} 年`;
}

function formatYearShort(y) {
  const abs = Math.abs(y);
  if (y < 0) {
    if (abs >= 100_000_000) {
      const yi = abs / 1e8;
      return (yi >= 100 ? yi.toFixed(0) : yi >= 10 ? yi.toFixed(1) : yi.toFixed(2)) + '億yr';
    }
    if (abs >= 1_000_000)    return (abs / 1e6).toFixed(0) + 'Myr';
    if (abs >= 10_000)       return (abs / 10000).toFixed(1) + '萬BC';
    if (abs >= 1_000)        return Math.round(abs / 1000) + 'K BC';
    return Math.round(abs) + ' BC';
  }
  if (y === 0) return 'AD 0';
  return 'AD ' + Math.round(y);
}

// ════════════════════════════════════════════
//  DRAW ERA BANDS — 高對比時代色塊
// ════════════════════════════════════════════
const ERA_BANDS = [
  { start:-13800000000, end:-4600000000, color:[120,50,220],  zh:'宇宙誕生',       en:'COSMIC DAWN'    },
  { start:-4600000000,  end:-541000000,  color:[30,80,200],   zh:'地球與生命',     en:'EARTH & LIFE'   },
  { start:-541000000,   end:-2600000,    color:[20,150,80],   zh:'複雜生命',       en:'COMPLEX LIFE'   },
  { start:-2600000,     end:-10000,      color:[180,140,10],  zh:'人類演化',       en:'HUMAN EVOLUTION'},
  { start:-10000,       end:-3000,       color:[200,80,20],   zh:'史前文明',       en:'PREHISTORIC'    },
  { start:-3000,        end:-500,        color:[200,50,40],   zh:'古代',           en:'ANCIENT'        },
  { start:-500,         end:500,         color:[160,40,90],   zh:'古典時代',       en:'CLASSICAL'      },
  { start:500,          end:1400,        color:[40,60,170],   zh:'中世紀',         en:'MEDIEVAL'       },
  { start:1400,         end:1800,        color:[80,40,160],   zh:'文藝復興·大航海', en:'RENAISSANCE'    },
  { start:1800,         end:1950,        color:[10,100,120],  zh:'工業時代',       en:'INDUSTRIAL'     },
  { start:1950,         end:2026,        color:[10,120,150],  zh:'當代',           en:'CONTEMPORARY'   },
];

function drawEraBands() {
  const zoom = currentZoom();
  ERA_BANDS.forEach(band => {
    const x1 = yearToX(band.start);
    const x2 = yearToX(band.end);
    if (x2 < -10 || x1 > canvasW + 10) return;
    const rx1 = Math.max(0, x1);
    const rx2 = Math.min(canvasW, x2);
    const w   = rx2 - rx1;
    if (w < 1) return;
    const [r,g,b] = band.color;

    // Background fill — always present, stronger when zoomed
    const fillAlpha = 0.08 + zoom * 0.1;
    ctx.fillStyle = `rgba(${r},${g},${b},${fillAlpha})`;
    ctx.fillRect(rx1, 0, w, canvasH);

    // Vertical border line at start of each era
    if (x1 > 2 && x1 < canvasW - 2) {
      ctx.beginPath();
      ctx.moveTo(x1, 0);
      ctx.lineTo(x1, canvasH);
      ctx.strokeStyle = `rgba(${r+80},${g+80},${b+80},${0.25 + zoom * 0.3})`;
      ctx.lineWidth = 1;
      ctx.setLineDash([]);
      ctx.stroke();
    }

    // Era label banner — always visible regardless of zoom
    if (w > 30) {
      const cx = Math.max(rx1 + 6, Math.min(rx2 - 6, rx1 + w / 2));
      ctx.save();
      ctx.beginPath();
      ctx.rect(rx1, 0, w, canvasH);
      ctx.clip();

      // Top colour accent strip
      ctx.fillStyle = `rgba(${r},${g},${b},${0.35 + zoom * 0.2})`;
      ctx.fillRect(rx1, 78, w, 32);

      // Chinese label
      const bigSz = Math.min(16, Math.max(10, w / 10));
      ctx.font = `700 ${bigSz}px "Noto Sans TC", sans-serif`;
      ctx.fillStyle = `rgba(255,255,255,0.92)`;
      ctx.textAlign = 'center';
      ctx.fillText(band.zh, cx, 93);

      // English sublabel
      if (w > 60) {
        ctx.font = `400 ${Math.max(8, bigSz - 4)}px "Noto Sans TC", sans-serif`;
        ctx.fillStyle = `rgba(255,255,255,0.55)`;
        ctx.fillText(band.en, cx, 93 + bigSz);
      }
      ctx.restore();
    }
  });
}

// ════════════════════════════════════════════
//  DRAW AXIS LINES
// ════════════════════════════════════════════
function drawAxisLines() {
  const yMap    = getAxisYMap();
  const visAxes = getVisibleAxes();
  const zoom    = currentZoom();

  // ── Pass 1: branch curves (drawn UNDER the axis lines) ──
  visAxes.forEach(([id, ax]) => {
    if (!ax.parent) return;
    const parentAx = AXES[ax.parent];
    if (!parentAx) return;
    if (!yMap.has(ax.parent)) return;   // parent not visible

    const y       = yMap.get(id);
    const parentY = yMap.get(ax.parent);
    if (Math.abs(y - parentY) < 3) return;

    const startX  = yearToX(ax.startYear);
    if (startX > canvasW + 60) return;

    const alpha   = subAxisAlpha(ax);
    const color   = ax.color;
    const forkX   = Math.max(-80, startX);
    const dy      = y - parentY;
    // Bend width proportional to vertical distance, capped
    const bendW   = Math.min(Math.abs(dy) * 0.9, 70);

    ctx.save();
    ctx.globalAlpha = alpha * 0.75;
    ctx.beginPath();
    ctx.moveTo(forkX, parentY);
    ctx.bezierCurveTo(
      forkX + bendW,        parentY,
      forkX + bendW * 0.5,  y,
      forkX + bendW * 1.2,  y
    );
    ctx.strokeStyle = color;
    ctx.lineWidth   = ax.zoomMin > 0 ? 1.0 : 1.4;
    ctx.setLineDash([]);
    ctx.stroke();

    // Fork dot on parent line
    if (forkX > -10 && forkX < canvasW + 10) {
      ctx.beginPath();
      ctx.arc(forkX, parentY, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    }
    ctx.restore();
  });

  // ── Pass 2: axis lines — start from branch landing point ──
  visAxes.forEach(([id, ax]) => {
    const y      = yMap.get(id);
    const color  = ax.color;
    const startX = yearToX(ax.startYear);
    const endX   = ax.endYear != null ? yearToX(ax.endYear) : canvasW + 20;

    if (startX > canvasW || endX < 0) return;

    // Compute where the branch curve lands — line must start there
    let lineFrom;
    if (ax.parent && yMap.has(ax.parent)) {
      const parentY = yMap.get(ax.parent);
      const dy      = y - parentY;
      const bendW   = Math.min(Math.abs(dy) * 0.9, 70);
      const forkX   = Math.max(-80, startX);
      const branchLanding = forkX + bendW * 1.2;
      lineFrom = Math.max(0, branchLanding);
    } else {
      lineFrom = Math.max(0, startX);
    }

    const lineTo = Math.min(canvasW + 20, endX);

    // Alpha — sub-axis fade in, human-evo fade out, ended civilisations fade out
    let alpha = ax.zoomMin > 0 ? subAxisAlpha(ax) * 0.8 : 0.65;
    if (id === 'human-evo') alpha *= humanEvoAlpha();

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.moveTo(lineFrom, y);
    ctx.lineTo(lineTo, y);
    ctx.strokeStyle = color;
    ctx.lineWidth   = ax.zoomMin > 0 ? 1.1 : 1.6;
    ctx.setLineDash([]);
    ctx.stroke();

    // Ended civilisation — dashed tail after endYear
    if (ax.endYear != null) {
      const fadeX = yearToX(ax.endYear);
      if (fadeX < canvasW && fadeX > 0) {
        ctx.beginPath();
        ctx.moveTo(fadeX, y);
        ctx.lineTo(Math.min(canvasW, fadeX + 60), y);
        ctx.strokeStyle = color;
        ctx.lineWidth   = 0.8;
        ctx.globalAlpha = alpha * 0.25;
        ctx.setLineDash([3, 6]);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }
    ctx.restore();

    // ── Label badge — placed right after branch landing (= where line starts) ──
    const labelX = Math.min(lineFrom + 4, canvasW - 100);
    const label     = ax.label;
    const fontSize  = ax.zoomMin > 0 ? 9 : 10;
    const pad       = 5;
    const labelAlpha = ax.zoomMin > 0 ? subAxisAlpha(ax) : 1;
    if (labelAlpha < 0.05) return;

    ctx.save();
    ctx.globalAlpha = labelAlpha;
    ctx.font = `500 ${fontSize}px "Noto Sans TC", sans-serif`;
    const tw = ctx.measureText(label).width;
    ctx.fillStyle = 'rgba(5,8,16,0.88)';
    ctx.beginPath();
    ctx.roundRect(labelX, y - 10, tw + pad * 2, 13, 3);
    ctx.fill();
    ctx.strokeStyle = color + '66';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.fillStyle = color;
    ctx.textAlign = 'left';
    ctx.fillText(label, labelX + pad, y - 1);
    ctx.restore();
  });
}

// ════════════════════════════════════════════
//  DRAW TIME RULER
// ════════════════════════════════════════════
function drawRuler() {
  const span = viewEnd - viewStart;

  // ── Tick marks along bottom ──
  const targets = [
    1e10, 5e9, 2e9, 1e9, 5e8, 2e8, 1e8,
    5e7, 2e7, 1e7, 5e6, 1e6, 5e5, 1e5,
    1e4, 5e3, 1e3, 500, 200, 100, 50, 10, 5, 1
  ];
  let step = targets.find(t => span / t < 10) || 1e10;
  const startTick = Math.ceil(viewStart / step) * step;
  const rulerY = canvasH - 44;

  // Ruler base line
  ctx.beginPath();
  ctx.moveTo(0, rulerY);
  ctx.lineTo(canvasW, rulerY);
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.setLineDash([]);
  ctx.stroke();

  ctx.font = '9px "Noto Sans TC", sans-serif';
  ctx.fillStyle = 'rgba(221,216,200,0.35)';
  ctx.textAlign = 'center';

  for (let y = startTick; y <= viewEnd; y += step) {
    const x = yearToX(y);
    if (x < 10 || x > canvasW - 10) continue;
    ctx.beginPath();
    ctx.moveTo(x, rulerY);
    ctx.lineTo(x, rulerY + 7);
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillText(formatYearShort(y), x, rulerY + 18);
  }

  // ── Scale bar (bottom-left) ──
  // Pick a nice round number whose pixel width is 60–200px
  const niceSteps = [1e10,5e9,2e9,1e9,5e8,2e8,1e8,5e7,2e7,1e7,5e6,1e6,
                     5e5,1e5,5e4,1e4,5e3,1e3,500,200,100,50,20,10,5,2,1];
  let scaleYears = niceSteps.find(s => {
    const px = (s / span) * canvasW;
    return px >= 60 && px <= 200;
  }) || step;
  const scalePx = Math.round((scaleYears / span) * canvasW);

  // Update DOM scale bar
  document.getElementById('scale-line').style.width = scalePx + 'px';
  document.getElementById('scale-label').textContent = formatScaleBar(scaleYears);
}

function formatScaleBar(years) {
  const abs = Math.abs(years);
  if (abs >= 1e9) return (abs / 1e9).toFixed(abs >= 5e9 ? 0 : 1) + ' 億年';
  if (abs >= 1e6) return (abs / 1e6).toFixed(abs >= 5e6 ? 0 : 1) + ' 百萬年';
  if (abs >= 1e3) return (abs / 1e3).toFixed(0) + ' 千年';
  return abs + ' 年';
}

// ════════════════════════════════════════════
//  DRAW BRANCH LINES (parallel events)
// ════════════════════════════════════════════
function drawBranchLines(eventsInView) {
  // Group events with same parallel_group
  const groups = {};
  eventsInView.forEach(ev => {
    if (ev.parallel_group) {
      if (!groups[ev.parallel_group]) groups[ev.parallel_group] = [];
      groups[ev.parallel_group].push(ev);
    }
  });

  Object.values(groups).forEach(group => {
    if (group.length < 2) return;
    const sorted = group.sort((a, b) => a.year - b.year);
    const startX = yearToX(sorted[0].year);
    const endX   = yearToX(sorted[sorted.length - 1].year);
    const baseY  = axisY(sorted[0].axis, sorted[0].sub_track || 0);

    ctx.save();
    ctx.strokeStyle = (( AXES[sorted[0].axis] && AXES[sorted[0].axis].color ) || '#fff' || '#fff') + '30';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 6]);
    ctx.beginPath();
    ctx.moveTo(startX, baseY);
    ctx.lineTo(endX, baseY);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  });
}

// ════════════════════════════════════════════
//  DRAW EVENTS — points + period blocks
// ════════════════════════════════════════════
function drawEvents(eventsInView) {
  const zoom = currentZoom();

  // ── Pass 1: period blocks (drawn under dots) ──
  eventsInView.forEach(ev => {
    if (!eventVisible(ev)) return;
    if (!ev.endYear) return;          // only period events

    const x1 = yearToX(ev.year);
    const x2 = yearToX(ev.endYear);
    if (x2 < -10 || x1 > canvasW + 10) return;

    const y      = axisY(ev.axis);
    const color  = (AXES[ev.axis] && AXES[ev.axis].color) || '#fff';
    const isHov  = hoveredEvent && hoveredEvent.id === ev.id;
    const rx1    = Math.max(-10, x1);
    const rx2    = Math.min(canvasW + 10, x2);
    const w      = rx2 - rx1;
    if (w < 2) return;

    const blockH = isHov ? 9 : 6;   // half-height of block
    const alpha  = isHov ? 0.55 : 0.32;

    ctx.save();

    // ── Filled band (method B) ──
    ctx.fillStyle = color;
    ctx.globalAlpha = alpha;
    ctx.fillRect(rx1, y - blockH, w, blockH * 2);

    // ── Thick border line on top of axis (method A feel) ──
    ctx.globalAlpha = isHov ? 0.9 : 0.65;
    ctx.fillStyle = color;
    ctx.fillRect(rx1, y - 1.5, w, 3);

    // ── Left end-cap | ──
    if (x1 > -5 && x1 < canvasW + 5) {
      ctx.globalAlpha = isHov ? 1 : 0.8;
      ctx.fillRect(x1 - 1, y - blockH - 2, 2, (blockH + 2) * 2);
    }
    // ── Right end-cap | ──
    if (x2 > -5 && x2 < canvasW + 5) {
      ctx.globalAlpha = isHov ? 1 : 0.8;
      ctx.fillRect(x2 - 1, y - blockH - 2, 2, (blockH + 2) * 2);
    }

    ctx.restore();

    // ── Label inside or above the block ──
    const showLabel = ev.level === 1 || (ev.level === 2 && zoom > 0.35) || (ev.level === 3 && zoom > 0.6);
    if (showLabel) {
      ctx.save();
      const fontSize = ev.level === 1 ? 11 : 10;
      ctx.font = `${ev.level === 1 ? '500 ' : ''}${fontSize}px "Noto Sans TC", sans-serif`;
      const tw = ctx.measureText(ev.zh).width;

      // Try to place label centred inside block; fall back to above
      const midX    = Math.max(rx1, Math.min(rx2, (rx1 + rx2) / 2));
      const clampX  = Math.max(tw / 2 + 4, Math.min(canvasW - tw / 2 - 4, midX));
      const labelY  = y - blockH - 6;

      // Label background
      ctx.fillStyle = 'rgba(5,8,16,0.78)';
      ctx.beginPath();
      ctx.roundRect(clampX - tw / 2 - 4, labelY - fontSize, tw + 8, fontSize + 3, 3);
      ctx.fill();

      ctx.fillStyle = isHov ? color : `rgba(221,216,200,${ev.level === 1 ? 0.9 : 0.65})`;
      ctx.textAlign = 'center';
      ctx.fillText(ev.zh, clampX, labelY);
      ctx.restore();
    }
  });

  // ── Pass 2: point events (no endYear) ──
  eventsInView.forEach(ev => {
    if (!eventVisible(ev)) return;
    if (ev.endYear) return;           // skip period events

    const x = yearToX(ev.year);
    if (x < -20 || x > canvasW + 20) return;

    const y        = axisY(ev.axis);
    const r        = dotRadius(ev);
    const color    = (AXES[ev.axis] && AXES[ev.axis].color) || '#fff';
    const isHovered = hoveredEvent && hoveredEvent.id === ev.id;

    // Connector line to ruler for level 1
    if (ev.level === 1 && zoom > 0.1) {
      const rulerY = canvasH - 38;
      ctx.beginPath();
      ctx.moveTo(x, y + r);
      ctx.lineTo(x, rulerY);
      ctx.strokeStyle = color + '18';
      ctx.lineWidth = 1;
      ctx.setLineDash([2, 5]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Glow
    if (isHovered || ev.level === 1) {
      ctx.beginPath();
      ctx.arc(x, y, r + (isHovered ? 8 : 4), 0, Math.PI * 2);
      const grad = ctx.createRadialGradient(x, y, 0, x, y, r + (isHovered ? 8 : 4));
      grad.addColorStop(0, color + '40');
      grad.addColorStop(1, color + '00');
      ctx.fillStyle = grad;
      ctx.fill();
    }

    // Dot
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = isHovered ? color : color + 'cc';
    ctx.fill();

    if (ev.level === 1) {
      ctx.beginPath();
      ctx.arc(x, y, r + 2, 0, Math.PI * 2);
      ctx.strokeStyle = color + '55';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Label
    const showLabel = ev.level === 1 || (ev.level === 2 && zoom > 0.35) || (ev.level === 3 && zoom > 0.6);
    if (showLabel) {
      const labelY = y - r - 7;
      ctx.font = ev.level === 1
        ? '500 11px "Noto Sans TC", sans-serif'
        : '10px "Noto Sans TC", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = isHovered ? color : `rgba(221,216,200,${ev.level === 1 ? 0.85 : 0.55})`;
      ctx.fillText(ev.zh, x, labelY);
    }
  });
}

// ════════════════════════════════════════════
//  DRAW FUTURE ZONE  (NOW → NOW+500)
// ════════════════════════════════════════════
function drawFutureZone() {
  const x1 = yearToX(NOW);
  const x2 = yearToX(FUTURE_END);
  if (x2 < 0 || x1 > canvasW) return;
  const rx1 = Math.max(0, x1);
  const rx2 = Math.min(canvasW, x2);

  // Light grey wash
  ctx.fillStyle = 'rgba(200,210,220,0.07)';
  ctx.fillRect(rx1, 0, rx2 - rx1, canvasH);

  // Left boundary line
  if (x1 > 0 && x1 < canvasW) {
    ctx.beginPath();
    ctx.moveTo(x1, 0);
    ctx.lineTo(x1, canvasH);
    ctx.strokeStyle = 'rgba(200,210,220,0.35)';
    ctx.lineWidth = 1;
    ctx.setLineDash([6, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
    // "今日" label
    ctx.font = '500 10px "Noto Sans TC", sans-serif';
    ctx.fillStyle = 'rgba(200,210,220,0.6)';
    ctx.textAlign = 'center';
    ctx.fillText('今日', x1, 158);
  }

  // Right hard boundary
  if (x2 > 0 && x2 < canvasW) {
    ctx.beginPath();
    ctx.moveTo(x2, 0);
    ctx.lineTo(x2, canvasH);
    ctx.strokeStyle = 'rgba(200,210,220,0.2)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.font = '500 10px "Noto Sans TC", sans-serif';
    ctx.fillStyle = 'rgba(200,210,220,0.35)';
    ctx.textAlign = 'center';
    ctx.fillText('未來 500 年', x2 - 30, 158);
  }
}

// ════════════════════════════════════════════
//  MAIN DRAW
// ════════════════════════════════════════════
function draw() {
  _frameCounter++;
  ctx.clearRect(0, 0, canvasW, canvasH);

  drawEraBands();
  drawFutureZone();
  drawAxisLines();

  const vis = events.filter(ev => {
    const x = yearToX(ev.year);
    return x > -100 && x < canvasW + 100;
  });

  drawBranchLines(vis);
  drawEvents(vis);
  drawRuler();
  drawCursorLine();  // ← 游標縱線

  // Time display
  const midYear = (viewStart + viewEnd) / 2;
  document.getElementById('time-display').textContent = formatYear(midYear);

  // Sync zoom slider
  const fullRange = FUTURE_END - TIMELINE_START;
  const curSpan   = viewEnd - viewStart;
  const logMin = Math.log(2);
  const logMax = Math.log(fullRange);
  const logCur = Math.log(Math.max(2, curSpan));
  const sliderVal = Math.round(100 * (1 - (logCur - logMin) / (logMax - logMin)));
  const sl = document.getElementById('zoom-slider');
  if (!sl._dragging) sl.value = Math.max(0, Math.min(100, sliderVal));

  // Sync Y zoom slider
  const yzsl = document.getElementById('yzoom-slider');
  if (!yzsl._dragging) yzsl.value = Math.round(yScale * 100);

  updateScrollbar();
  updateVScrollbar();
}

// ════════════════════════════════════════════
//  CURSOR VERTICAL LINE
// ════════════════════════════════════════════
function drawCursorLine() {
  if (mouseX < 0 || isDragging) return;
  const rulerY = canvasH - 44;

  // Vertical line
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(mouseX, 78);
  ctx.lineTo(mouseX, rulerY);
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Year label at top of line
  const year = xToYear(mouseX);
  const label = formatYear(year);
  ctx.font = '500 10px "Noto Sans TC", sans-serif';
  const tw = ctx.measureText(label).width;
  const lx = Math.max(tw / 2 + 6, Math.min(canvasW - tw / 2 - 6, mouseX));
  const ly = 100;

  // Label background pill
  ctx.fillStyle = 'rgba(5,8,16,0.85)';
  ctx.beginPath();
  ctx.roundRect(lx - tw / 2 - 7, ly - 13, tw + 14, 17, 8);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // Label text
  ctx.fillStyle = 'rgba(221,216,200,0.85)';
  ctx.textAlign = 'center';
  ctx.fillText(label, lx, ly);
  ctx.restore();
}

// ════════════════════════════════════════════
//  VERTICAL SCROLLBAR SYNC
// ════════════════════════════════════════════
function clampYOffset() {
  const ch = contentHeight();
  const visible = canvasH - 140;
  const maxScroll = Math.max(0, ch - visible);
  yOffset = Math.max(-maxScroll, Math.min(0, yOffset));
}

function updateVScrollbar() {
  const track = document.getElementById('vscroll-track');
  const thumb = document.getElementById('vscroll-thumb');
  if (!track || !thumb) return;
  const trackH = track.clientHeight;
  const ch = contentHeight();
  const visible = canvasH - 140;

  if (ch <= visible) {
    thumb.style.height = trackH + 'px';
    thumb.style.top = '0px';
    return;
  }
  const thumbH = Math.max(20, Math.min(trackH - 4, (visible / ch) * trackH));
  const maxScroll = ch - visible;
  const scrollFrac = (-yOffset) / maxScroll;
  const thumbTop = scrollFrac * (trackH - thumbH);
  thumb.style.height = thumbH + 'px';
  thumb.style.top = thumbTop + 'px';
}
function updateScrollbar() {
  const fullRange  = FUTURE_END - TIMELINE_START;
  const curSpan    = viewEnd - viewStart;
  const track = document.getElementById('scrollbar-track');
  const thumb = document.getElementById('scrollbar-thumb');
  if (!track || !thumb) return;
  const trackW = track.clientWidth;

  const thumbW   = Math.max(24, Math.min(trackW - 4, (curSpan / fullRange) * trackW));
  const maxPan   = fullRange - curSpan;
  const panFrac  = maxPan > 0 ? Math.max(0, Math.min(1, (viewStart - TIMELINE_START) / maxPan)) : 0;
  const thumbLeft = panFrac * (trackW - thumbW);

  thumb.style.width = thumbW + 'px';
  thumb.style.left  = thumbLeft + 'px';
}

// ════════════════════════════════════════════
//  PAN & ZOOM HELPERS
// ════════════════════════════════════════════

// Hard boundary clamp — never go outside [TIMELINE_START, FUTURE_END]
function clampView() {
  const span = viewEnd - viewStart;
  if (viewStart < TIMELINE_START) {
    viewStart = TIMELINE_START;
    viewEnd   = TIMELINE_START + span;
  }
  if (viewEnd > FUTURE_END) {
    viewEnd   = FUTURE_END;
    viewStart = FUTURE_END - span;
  }
  // Extra safety: if span > full range, fit exactly
  if (viewStart < TIMELINE_START) viewStart = TIMELINE_START;
}

function panBy(fraction) {
  const span = viewEnd - viewStart;
  const shift = span * fraction;
  viewStart += shift;
  viewEnd   += shift;
  clampView();
  draw();
}

function zoomBy(factor, centerX) {
  const cx = centerX !== undefined ? centerX : canvasW / 2;
  const mouseYear = xToYear(cx);
  const span = viewEnd - viewStart;
  const fullRange = FUTURE_END - TIMELINE_START;
  let newSpan = span * factor;
  const minSpan = 2;
  newSpan = Math.min(Math.max(newSpan, minSpan), fullRange);
  const ratio = (mouseYear - viewStart) / span;
  viewStart = mouseYear - ratio * newSpan;
  viewEnd   = viewStart + newSpan;
  clampView();
  draw();
}

function zoomToSpan(newSpan) {
  const mid = (viewStart + viewEnd) / 2;
  const fullRange = FUTURE_END - TIMELINE_START;
  newSpan = Math.max(2, Math.min(fullRange, newSpan));
  viewStart = mid - newSpan / 2;
  viewEnd   = mid + newSpan / 2;
  clampView();
  draw();
}

// Jump to a specific time range with smooth animation
function jumpTo(start, end) {
  const padding = (end - start) * 0.15;
  const targetStart = start - padding;
  const targetEnd   = end   + padding;

  // Animate over ~400ms
  const fromStart = viewStart;
  const fromEnd   = viewEnd;
  const t0 = performance.now();
  const dur = 420;

  function step(now) {
    const t = Math.min(1, (now - t0) / dur);
    // Ease in-out cubic
    const e = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
    viewStart = fromStart + (targetStart - fromStart) * e;
    viewEnd   = fromEnd   + (targetEnd   - fromEnd)   * e;
    clampView();
    draw();
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ════════════════════════════════════════════
//  Y ZOOM SLIDER
// ════════════════════════════════════════════
const yzoomSlider = document.getElementById('yzoom-slider');
yzoomSlider.addEventListener('input', () => {
  yzoomSlider._dragging = true;
  yScale = parseInt(yzoomSlider.value) / 100;
  clampYOffset();
  draw();
});
yzoomSlider.addEventListener('pointerup', () => { yzoomSlider._dragging = false; });
yzoomSlider.addEventListener('pointercancel', () => { yzoomSlider._dragging = false; });

// ════════════════════════════════════════════
//  VERTICAL SCROLLBAR DRAG
// ════════════════════════════════════════════
{
  const vtrack = document.getElementById('vscroll-track');
  const vthumb = document.getElementById('vscroll-thumb');
  let vDragging = false, vStartY = 0, vStartTop = 0;

  vthumb.addEventListener('pointerdown', e => {
    e.stopPropagation();
    vDragging = true;
    vStartY = e.clientY;
    vStartTop = parseFloat(vthumb.style.top) || 0;
    vthumb.classList.add('dragging');
    vthumb.setPointerCapture(e.pointerId);
  });

  vthumb.addEventListener('pointermove', e => {
    if (!vDragging) return;
    const trackH = vtrack.clientHeight;
    const thumbH = parseFloat(vthumb.style.height) || 20;
    const maxTop = trackH - thumbH;
    const newTop = Math.max(0, Math.min(maxTop, vStartTop + e.clientY - vStartY));
    const frac = maxTop > 0 ? newTop / maxTop : 0;
    const ch = contentHeight();
    const visible = canvasH - 140;
    const maxScroll = Math.max(0, ch - visible);
    yOffset = -(frac * maxScroll);
    draw();
  });

  vthumb.addEventListener('pointerup', () => {
    vDragging = false;
    vthumb.classList.remove('dragging');
  });

  // Click track to jump
  vtrack.addEventListener('pointerdown', e => {
    if (e.target === vthumb) return;
    const rect = vtrack.getBoundingClientRect();
    const frac = (e.clientY - rect.top) / rect.height;
    const ch = contentHeight();
    const visible = canvasH - 140;
    const maxScroll = Math.max(0, ch - visible);
    yOffset = -(frac * maxScroll);
    clampYOffset();
    draw();
  });
}

// ════════════════════════════════════════════
//  ZOOM SLIDER
// ════════════════════════════════════════════
const zoomSlider = document.getElementById('zoom-slider');
zoomSlider.addEventListener('input', () => {
  zoomSlider._dragging = true;
  const val = parseInt(zoomSlider.value);
  const fullRange = FUTURE_END - TIMELINE_START;
  const logMin = Math.log(2);
  const logMax = Math.log(fullRange);
  const logTarget = logMax - (val / 100) * (logMax - logMin);
  zoomToSpan(Math.exp(logTarget));
});
zoomSlider.addEventListener('pointerup',    () => { zoomSlider._dragging = false; });
zoomSlider.addEventListener('pointercancel',() => { zoomSlider._dragging = false; });

// Reset button → full view + reset Y zoom + reset Y scroll
document.getElementById('btn-reset').addEventListener('click', () => {
  viewStart = TIMELINE_START;
  viewEnd   = NOW + 100;
  yScale    = 1.0;
  yOffset   = 0;
  draw();
});

// ════════════════════════════════════════════
//  BOTTOM SCROLLBAR DRAG
// ════════════════════════════════════════════
{
  const track = document.getElementById('scrollbar-track');
  const thumb = document.getElementById('scrollbar-thumb');
  let sbDragging = false, sbStartX = 0, sbStartLeft = 0;

  thumb.addEventListener('pointerdown', e => {
    e.stopPropagation();
    sbDragging = true;
    sbStartX = e.clientX;
    sbStartLeft = parseFloat(thumb.style.left) || 0;
    thumb.classList.add('dragging');
    thumb.setPointerCapture(e.pointerId);
  });

  thumb.addEventListener('pointermove', e => {
    if (!sbDragging) return;
    const trackW  = track.clientWidth;
    const thumbW  = parseFloat(thumb.style.width) || 40;
    const maxLeft = trackW - thumbW;
    const newLeft = Math.max(0, Math.min(maxLeft, sbStartLeft + e.clientX - sbStartX));
    const frac = maxLeft > 0 ? newLeft / maxLeft : 0;

    const fullRange = FUTURE_END - TIMELINE_START;
    const curSpan   = viewEnd - viewStart;
    const maxPan    = fullRange - curSpan;
    viewStart = TIMELINE_START + frac * maxPan;
    viewEnd   = viewStart + curSpan;
    clampView();
    draw();
  });

  thumb.addEventListener('pointerup', () => {
    sbDragging = false;
    thumb.classList.remove('dragging');
  });

  // Click on track (not thumb) → jump
  track.addEventListener('pointerdown', e => {
    if (e.target === thumb) return;
    const rect = track.getBoundingClientRect();
    const clickFrac = (e.clientX - rect.left) / rect.width;
    const fullRange = FUTURE_END - TIMELINE_START;
    const curSpan   = viewEnd - viewStart;
    viewStart = TIMELINE_START + clickFrac * fullRange - curSpan / 2;
    viewEnd   = viewStart + curSpan;
    clampView();
    draw();
  });
}

// ════════════════════════════════════════════
//  KEYBOARD NAVIGATION
// ════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (document.getElementById('popup-overlay').classList.contains('show') && e.key !== 'Escape') return;
  switch(e.key) {
    case 'ArrowLeft':  e.preventDefault(); panBy(-0.2); break;
    case 'ArrowRight': e.preventDefault(); panBy( 0.2); break;
    case 'ArrowUp':    e.preventDefault(); yOffset += 60; clampYOffset(); draw(); break;
    case 'ArrowDown':  e.preventDefault(); yOffset -= 60; clampYOffset(); draw(); break;
    case '+': case '=': e.preventDefault(); zoomBy(0.6); break;
    case '-': case '_': e.preventDefault(); zoomBy(1.6); break;
    case 'Escape': document.getElementById('popup-overlay').classList.remove('show'); break;
  }
});

// ════════════════════════════════════════════
//  WHEEL — normal=H-zoom on cursor, Ctrl=V-zoom, Shift=V-scroll
// ════════════════════════════════════════════
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  if (e.ctrlKey) {
    // Ctrl+wheel → vertical zoom, keep mouseY fixed
    const factor = e.deltaY > 0 ? 1.15 : 0.87;
    const oldScale = yScale;
    yScale = Math.max(0.3, Math.min(4.0, yScale * factor));
    // Anchor: keep the content under mouseY in place
    yOffset = (yOffset - (e.clientY - 90)) * (yScale / oldScale) + (e.clientY - 90);
    clampYOffset();
    draw();
  } else if (e.shiftKey) {
    // Shift+wheel → vertical scroll
    yOffset -= e.deltaY * 0.8;
    clampYOffset();
    draw();
  } else {
    // Normal wheel → horizontal zoom centered on mouseX
    const factor = e.deltaY > 0 ? 1.12 : 0.89;
    zoomBy(factor, e.clientX);
  }
}, { passive: false });

// ════════════════════════════════════════════
//  DRAG PAN (X + Y)
// ════════════════════════════════════════════
canvas.addEventListener('pointerdown', e => {
  if (e.button !== 0) return;
  isDragging = true;
  dragStartX    = e.clientX;
  dragStartY    = e.clientY;
  dragViewStart = viewStart;
  dragYOffset   = yOffset;
  canvas.setPointerCapture(e.pointerId);
  canvas.style.cursor = 'grabbing';
});

canvas.addEventListener('pointermove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  if (isDragging) {
    const dx = e.clientX - dragStartX;
    const dy = e.clientY - dragStartY;
    // Horizontal pan
    const span    = viewEnd - viewStart;
    const yearDx  = -(dx / canvasW) * span;
    viewStart = dragViewStart + yearDx;
    viewEnd   = viewStart + span;
    clampView();
    // Vertical pan
    yOffset = dragYOffset + dy;
    clampYOffset();
    draw();
  } else {
    handleHover(e.clientX, e.clientY);
    draw();
  }
});

canvas.addEventListener('pointerleave', () => {
  mouseX = -1; mouseY = -1;
  draw();
});

canvas.addEventListener('pointerup', e => {
  if (isDragging) {
    isDragging = false;
    canvas.style.cursor = 'crosshair';
    // Check if it was a click (minimal movement)
    if (Math.abs(e.clientX - dragStartX) < 5) {
      handleClick(e.clientX, e.clientY);
    }
  }
});

// ════════════════════════════════════════════
//  HOVER
// ════════════════════════════════════════════
function findEventAt(mx, my) {
  let best = null, bestDist = Infinity;

  events.forEach(ev => {
    if (!eventVisible(ev)) return;
    const y = axisY(ev.axis);

    if (ev.endYear) {
      // Period block hit test — click anywhere inside the block
      const x1  = yearToX(ev.year);
      const x2  = yearToX(ev.endYear);
      const blockH = 10;
      if (mx >= x1 - 4 && mx <= x2 + 4 && Math.abs(my - y) <= blockH + 4) {
        // Use distance to midpoint for priority (prefer smaller blocks)
        const midX = (x1 + x2) / 2;
        const dist = Math.abs(mx - midX) + Math.abs(my - y) * 2;
        if (dist < bestDist) {
          best = ev; bestDist = dist;
        }
      }
    } else {
      // Point event hit test
      const x    = yearToX(ev.year);
      const dist = Math.hypot(mx - x, my - y);
      const threshold = Math.max(14, dotRadius(ev) + 8);
      if (dist < threshold && dist < bestDist) {
        best = ev; bestDist = dist;
      }
    }
  });
  return best;
}

function handleHover(mx, my) {
  const ev = findEventAt(mx, my);
  const tooltip = document.getElementById('tooltip');
  if (ev) {
    if (!hoveredEvent || hoveredEvent.id !== ev.id) {
      hoveredEvent = ev;
      draw();
    }
    canvas.style.cursor = 'pointer';
    document.getElementById('tt-era').textContent = ( AXES[ev.axis] && AXES[ev.axis].label ) || ev.axis;
    document.getElementById('tt-era').style.color = ( AXES[ev.axis] && AXES[ev.axis].color ) || '#fff';
    document.getElementById('tt-zh').textContent  = ev.zh;
    document.getElementById('tt-en').textContent  = ev.en;
    const timeStr = ev.endYear
      ? `${formatYear(ev.year)} — ${formatYear(ev.endYear)}`
      : formatYear(ev.year);
    document.getElementById('tt-time').textContent = timeStr;

    let tx = mx + 16, ty = my - 10;
    if (tx + 230 > canvasW) tx = mx - 230;
    if (ty + 120 > canvasH) ty = my - 120;
    tooltip.style.left = tx + 'px';
    tooltip.style.top  = ty + 'px';
    tooltip.classList.add('show');
  } else {
    if (hoveredEvent) { hoveredEvent = null; draw(); }
    canvas.style.cursor = 'crosshair';
    tooltip.classList.remove('show');
  }
}

// ════════════════════════════════════════════
//  CLICK → POPUP
// ════════════════════════════════════════════
function handleClick(mx, my) {
  const ev = findEventAt(mx, my);
  if (ev) showPopup(ev);
}

function showPopup(ev) {
  const overlay = document.getElementById('popup-overlay');
  const color = ( AXES[ev.axis] && AXES[ev.axis].color ) || '#fff' || '#fff';

  // Image
  const imgWrap = document.getElementById('popup-img-wrap');
  if (ev.image) {
    imgWrap.innerHTML = `<img class="popup-img" src="${ev.image}" alt="${ev.zh}"
      onerror="this.parentNode.innerHTML='<div class=\'popup-img-placeholder\'><svg width=\'64\' height=\'64\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'white\'><circle cx=\'12\' cy=\'12\' r=\'10\'/><path d=\'M2 12h20M12 2a15 15 0 010 20M12 2a15 15 0 000 20\'/></svg></div>'"
    >`;
  } else {
    imgWrap.innerHTML = `<div class="popup-img-placeholder"><svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="white"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 010 20M12 2a15 15 0 000 20"/></svg></div>`;
  }

  // Tag
  const tag = document.getElementById('popup-tag');
  tag.textContent = (( AXES[ev.axis] && AXES[ev.axis].label ) || ev.axis || ev.axis).toUpperCase();
  tag.style.color = color;
  tag.style.borderColor = color + '44';
  tag.style.background = color + '11';

  document.getElementById('popup-zh').textContent = ev.zh;
  document.getElementById('popup-en').textContent = ev.en;
  document.getElementById('popup-time').textContent = formatYear(ev.year);
  document.getElementById('popup-desc-zh').textContent = ev.desc_zh || '';
  document.getElementById('popup-desc-en').textContent = ev.desc_en || '';

  // Links
  const linksEl = document.getElementById('popup-links');
  linksEl.innerHTML = '';
  if (ev.wiki_zh) {
    const a = document.createElement('a');
    a.className = 'popup-link';
    a.href = ev.wiki_zh;
    a.target = '_blank';
    a.rel = 'noopener';
    a.innerHTML = '📖 中文 Wikipedia';
    linksEl.appendChild(a);
  }
  if (ev.wiki_en) {
    const a = document.createElement('a');
    a.className = 'popup-link';
    a.href = ev.wiki_en;
    a.target = '_blank';
    a.rel = 'noopener';
    a.innerHTML = '🌐 EN Wikipedia';
    linksEl.appendChild(a);
  }

  overlay.classList.add('show');
}

document.getElementById('popup-close').addEventListener('click', () => {
  document.getElementById('popup-overlay').classList.remove('show');
});
document.getElementById('popup-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('popup-overlay')) {
    document.getElementById('popup-overlay').classList.remove('show');
  }
});

// ════════════════════════════════════════════
//  LEGEND TOGGLE
// ════════════════════════════════════════════
document.querySelectorAll('.leg').forEach(el => {
  el.addEventListener('click', () => {
    const axis = el.dataset.axis;
    if (hiddenAxes.has(axis)) {
      hiddenAxes.delete(axis);
      el.style.opacity = '0.85';
    } else {
      hiddenAxes.add(axis);
      el.style.opacity = '0.25';
    }
    draw();
  });
});

// ════════════════════════════════════════════
//  LOAD DATA
// ════════════════════════════════════════════
async function loadEvents() {
  try {
    const res = await fetch('data/events.json');
    const data = await res.json();
    events = data.events;
  } catch (err) {
    console.warn('Could not load events.json, using inline fallback');
    events = FALLBACK_EVENTS;
  }
  draw();
}
