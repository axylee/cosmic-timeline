# Block access to dev tools and scripts
[[redirects]]
  from = "/check.py"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/add-events-*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/tools/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/README.md"
  to = "/404.html"
  status = 404
  force = true
