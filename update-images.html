<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Cosmic Timeline — 圖片更新工具</title>
<style>
  :root {
    --bg:#05080f; --surface:#0c1020; --border:rgba(255,255,255,0.08);
    --text:#ddd8c8; --muted:rgba(221,216,200,0.45); --accent:#60a5fa;
    --green:#34d399; --red:#f87171; --yellow:#fbbf24;
    --purple:#a78bfa; --cyan:#67e8f9;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC','Noto Sans',sans-serif;font-size:13px;min-height:100vh;padding:32px 24px}
  h1{font-size:18px;font-weight:500;margin-bottom:6px;color:#fff}
  .subtitle{color:var(--muted);font-size:12px;margin-bottom:28px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:20px}
  .card-title{font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
  .row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
  label{font-size:11px;color:var(--muted);display:block;margin-bottom:5px}
  input{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 12px;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s}
  input:focus{border-color:rgba(255,255,255,0.25)}
  input[type=text]{width:380px}
  button{padding:9px 20px;border-radius:8px;border:none;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
  .btn-primary{background:rgba(96,165,250,0.2);color:var(--accent);border:1px solid rgba(96,165,250,0.3)}
  .btn-primary:hover{background:rgba(96,165,250,0.35)}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed}
  .btn-success{background:rgba(52,211,153,0.2);color:var(--green);border:1px solid rgba(52,211,153,0.3)}
  .btn-success:hover{background:rgba(52,211,153,0.35)}
  .btn-warn{background:rgba(251,191,36,0.15);color:var(--yellow);border:1px solid rgba(251,191,36,0.3)}
  .btn-warn:hover{background:rgba(251,191,36,0.28)}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
  .btn-ghost:hover{color:var(--text);border-color:rgba(255,255,255,0.2)}
  .btn-skip{background:rgba(255,255,255,0.05);color:var(--muted);border:1px solid var(--border);font-size:12px;padding:7px 14px}
  .btn-skip:hover{color:var(--text)}

  .progress-wrap{margin:14px 0}
  .progress-bar-bg{background:rgba(255,255,255,0.06);border-radius:4px;height:6px;overflow:hidden}
  .progress-bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .3s;width:0}
  .progress-text{font-size:11px;color:var(--muted);margin-top:6px}

  .stats{display:flex;gap:16px;margin:14px 0;flex-wrap:wrap}
  .stat{text-align:center;min-width:52px}
  .stat-num{font-size:22px;font-weight:300}
  .stat-label{font-size:9px;color:var(--muted);margin-top:2px;white-space:nowrap}

  #log{height:200px;overflow-y:auto;padding:12px;background:rgba(0,0,0,0.3);border-radius:8px;font-family:'Courier New',monospace;font-size:11px;line-height:1.7}
  .log-ok{color:var(--green)} .log-auto{color:#86efac}
  .log-fail{color:var(--red)} .log-info{color:var(--muted)} .log-warn{color:var(--yellow)}

  .badge{display:inline-block;padding:2px 7px;border-radius:8px;font-size:10px}
  .badge-ok{background:rgba(52,211,153,0.15);color:var(--green)}
  .badge-skip{background:rgba(255,255,255,0.06);color:var(--muted)}
  .badge-fail{background:rgba(248,113,113,0.15);color:var(--red)}
  .badge-manual{background:rgba(96,165,250,0.15);color:var(--accent)}

  /* ── PICKER overlay ── */
  #picker-overlay{
    position:fixed;inset:0;z-index:999;
    background:rgba(0,0,0,0.85);backdrop-filter:blur(6px);
    display:flex;align-items:center;justify-content:center;
    padding:24px;
  }
  #picker-overlay.hide{display:none}
  #picker-box{
    background:#0c1020;border:1px solid rgba(255,255,255,0.12);
    border-radius:16px;padding:24px;max-width:960px;width:100%;
    max-height:90vh;overflow-y:auto;
  }
  #picker-title{font-size:16px;font-weight:500;color:#fff;margin-bottom:4px}
  #picker-meta{font-size:11px;color:var(--muted);margin-bottom:16px}
  #picker-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:12px;margin-bottom:20px;
  }
  .pick-item{
    border:2px solid rgba(255,255,255,0.08);border-radius:10px;
    overflow:hidden;cursor:pointer;transition:all .15s;
    background:rgba(255,255,255,0.03);
  }
  .pick-item:hover{border-color:var(--accent);transform:scale(1.02)}
  .pick-item.selected{border-color:var(--green);box-shadow:0 0 0 1px var(--green)}
  .pick-item img{width:100%;height:130px;object-fit:cover;display:block;background:#070b18}
  .pick-item .pick-label{
    padding:7px 10px;font-size:10px;
    border-top:1px solid rgba(255,255,255,0.06);
  }
  .pick-source{color:var(--muted)}
  .pick-item.pick-none{border-style:dashed;display:flex;flex-direction:column;align-items:center;justify-content:center;height:172px;gap:6px;color:var(--muted);font-size:12px}
  .pick-item.pick-none:hover{border-color:var(--red);color:var(--red)}
  .pick-item.img-broken{opacity:0.4;border-color:var(--red);}
  .pick-item.img-broken::after{content:'⚠ 圖片無法載入';display:block;padding:8px;font-size:10px;color:var(--red);text-align:center;}
  /* custom URL row */
  #picker-custom{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
  #picker-custom input{flex:1;min-width:200px}
  #picker-custom-preview{width:60px;height:40px;object-fit:cover;border-radius:6px;display:none;border:1px solid rgba(255,255,255,0.1)}
  #picker-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

  /* missing list */
  #missing-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;margin-top:12px;max-height:360px;overflow-y:auto}
  .missing-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:8px;gap:10px}
  .missing-item-left{display:flex;flex-direction:column;gap:3px;flex:1;min-width:0}
  .missing-zh{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .missing-axis{font-size:10px;color:var(--muted)}
  .missing-links{display:flex;gap:5px;flex-shrink:0}
  .wiki-btn{padding:4px 9px;border-radius:6px;font-size:10px;cursor:pointer;text-decoration:none;white-space:nowrap;border:1px solid;transition:all .12s}
  .wiki-btn.zh{border-color:rgba(252,165,165,0.35);color:#fca5a5;background:transparent}
  .wiki-btn.zh:hover{background:rgba(252,165,165,0.12)}
  .wiki-btn.en{border-color:rgba(147,197,253,0.35);color:#93c5fd;background:transparent}
  .wiki-btn.en:hover{background:rgba(147,197,253,0.12)}

  /* result table */
  #result-table{width:100%;border-collapse:collapse;font-size:12px}
  #result-table th{text-align:left;padding:7px 10px;color:var(--muted);font-weight:400;font-size:10px;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border)}
  #result-table td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle}
  #result-table img{width:48px;height:32px;object-fit:cover;border-radius:4px}

  /* broken image list */
  .broken-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:rgba(248,113,113,0.05);border:1px solid rgba(248,113,113,0.2);border-radius:8px}
  .broken-thumb{width:56px;height:38px;object-fit:cover;border-radius:5px;flex-shrink:0;background:rgba(255,255,255,0.05)}
  .broken-info{flex:1;min-width:0}
  .broken-zh{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .broken-url{font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .broken-actions{display:flex;gap:6px;flex-shrink:0}
  .btn-clear{padding:4px 10px;border-radius:6px;font-size:10px;font-family:inherit;cursor:pointer;background:rgba(248,113,113,0.15);color:var(--red);border:1px solid rgba(248,113,113,0.3)}
  .btn-clear:hover{background:rgba(248,113,113,0.3)}

  #drop-zone{border:2px dashed rgba(255,255,255,0.12);border-radius:10px;padding:28px;text-align:center;color:var(--muted);cursor:pointer;transition:all .2s;margin-bottom:14px}
  #drop-zone:hover,#drop-zone.drag-over{border-color:var(--accent);color:var(--accent);background:rgba(96,165,250,0.05)}
  #drop-zone input{display:none}
  .spacer{height:8px} .hide{display:none!important}
</style>
</head>
<body>

<!-- ══ PICKER OVERLAY ══ -->
<div id="picker-overlay" class="hide">
  <div id="picker-box">
    <div id="picker-title"></div>
    <div id="picker-meta"></div>

    <!-- Candidate images grid -->
    <div id="picker-grid"></div>

    <!-- Custom URL input -->
    <div style="font-size:11px;color:var(--muted);margin-bottom:8px">或輸入自訂圖片 URL：</div>
    <div id="picker-custom">
      <input type="text" id="picker-url-input" placeholder="https://upload.wikimedia.org/...">
      <button class="btn-ghost" onclick="previewCustom()">預覽</button>
      <img id="picker-custom-preview">
    </div>

    <div id="picker-actions">
      <button class="btn-success" id="picker-confirm" onclick="pickerConfirm()">✓ 使用選取的圖片</button>
      <button class="btn-skip" onclick="pickerSkip()">略過此事件</button>
      <button class="btn-ghost" onclick="pickerKeep()">保留原有圖片</button>
      <span id="picker-status" style="font-size:11px;color:var(--muted)"></span>
    </div>
  </div>
</div>

<h1>🌌 Cosmic Timeline — 圖片更新工具</h1>
<p class="subtitle">多來源抓取 · 自動選取或手動挑選最佳圖片</p>

<!-- Step 1: Load -->
<div class="card">
  <div class="card-title">步驟 1 — 載入 events.json</div>
  <div id="drop-zone" onclick="document.getElementById('file-input').click()">
    <input type="file" id="file-input" accept=".json">
    📂 點擊選擇檔案，或拖曳 events.json 到這裡
  </div>
  <div class="row">
    <div>
      <label>或從 GitHub 直接載入</label>
      <input type="text" id="url-input" value="https://raw.githubusercontent.com/axylee/cosmic-timeline/main/data/events.json">
    </div>
    <button class="btn-primary" onclick="loadFromUrl()">從 URL 載入</button>
  </div>
  <div class="spacer"></div>
  <div id="load-status" class="log-info"></div>
</div>

<!-- Validate existing images -->
<div class="card hide" id="step-validate">
  <div class="card-title">🔎 檢查現有圖片連結有效性</div>
  <div class="row" style="margin-bottom:12px">
    <button class="btn-warn" id="btn-validate" onclick="validateExistingImages()">▶ 開始檢查</button>
    <button class="btn-ghost" id="btn-validate-stop" onclick="validateStop()" style="display:none">⬛ 停止</button>
    <span id="validate-status" style="font-size:12px;color:var(--muted);align-self:center"></span>
  </div>
  <div class="progress-wrap" id="validate-progress" style="display:none">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="validate-fill"></div></div>
    <div class="progress-text" id="validate-text"></div>
  </div>
  <!-- Broken list -->
  <div id="validate-broken-wrap" style="display:none;margin-top:14px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px">
      <span id="validate-broken-count" style="font-size:13px;color:var(--red)"></span>
      <div style="display:flex;gap:8px">
        <button class="btn-warn" onclick="clearAllBroken()">⚠ 清除全部失效連結</button>
        <button class="btn-ghost" onclick="document.getElementById('validate-broken-wrap').style.display='none'">收起</button>
      </div>
    </div>
    <div id="validate-broken-list" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:8px;max-height:420px;overflow-y:auto"></div>
  </div>
</div>

<!-- Missing events -->
<div class="card hide" id="step-missing">
  <div class="card-title">🔍 缺少圖片的事件</div>
  <div class="row" style="margin-bottom:10px">
    <button class="btn-warn" onclick="showMissing()">列出缺圖事件</button>
    <button class="btn-ghost" onclick="document.getElementById('missing-list').innerHTML=''">收起</button>
    <span id="missing-count" style="font-size:12px;color:var(--muted);align-self:center"></span>
  </div>
  <p style="font-size:11px;color:var(--muted);margin-bottom:8px">點擊連結在新分頁開啟 Wikipedia，手動找圖後用 ✏ 編輯填入。</p>
  <div id="missing-list"></div>
</div>

<!-- Step 2: Run -->
<div class="card hide" id="step-run">
  <div class="card-title">步驟 2 — 批量抓取圖片</div>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">總事件</div></div>
    <div class="stat"><div class="stat-num green" id="stat-ok">0</div><div class="stat-label">自動 ✓</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--accent)" id="stat-manual">0</div><div class="stat-label">手選 ✓</div></div>
    <div class="stat"><div class="stat-num red" id="stat-fail">0</div><div class="stat-label">失敗/略過</div></div>
    <div class="stat"><div class="stat-num yellow" id="stat-skip">0</div><div class="stat-label">有圖略過</div></div>
  </div>

  <div class="row" style="margin-bottom:10px">
    <button class="btn-primary" id="btn-run" onclick="runUpdate()">▶ 開始更新圖片</button>
    <button class="btn-ghost" id="btn-stop" onclick="stopUpdate()" style="display:none">⬛ 停止</button>
    <label style="margin:0;display:flex;align-items:center;gap:6px;cursor:pointer">
      <input type="checkbox" id="chk-overwrite"> 覆蓋已有的圖片（未勾選時有圖片的事件直接略過）
    </label>
    <label style="margin:0;display:flex;align-items:center;gap:6px;cursor:pointer">
      <input type="checkbox" id="chk-zh" checked> 優先中文 Wikipedia
    </label>
  </div>
  <div style="font-size:11px;color:var(--muted);margin-bottom:12px;line-height:1.6">
    📌 <strong style="color:var(--text)">覆蓋模式</strong>：所有來源同時抓取，若取得多張候選圖片則<strong style="color:var(--accent)">暫停讓你選擇</strong>，只有一張時自動套用。
  </div>

  <div class="progress-wrap" id="progress-wrap" style="display:none">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
    <div class="progress-text" id="progress-text"></div>
  </div>
  <div id="log"></div>
</div>

<!-- Step 3: Download -->
<div class="card hide" id="step-download">
  <div class="card-title">步驟 3 — 下載更新後的 JSON</div>
  <div class="row">
    <button class="btn-success" onclick="downloadJson()">⬇ 下載 events.json</button>
    <button class="btn-ghost" onclick="toggleTable()">📋 查看結果清單</button>
  </div>
  <div class="spacer"></div>
  <div id="result-wrap" style="display:none;overflow-x:auto">
    <table id="result-table">
      <thead><tr><th>事件</th><th>狀態</th><th>預覽</th><th>URL</th></tr></thead>
      <tbody id="result-body"></tbody>
    </table>
  </div>
</div>

<script>
let eventsData = null, results = [], shouldStop = false;
let statOk=0, statManual=0, statFail=0, statSkip=0;

// ══ FILE LOADING ══
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
dropZone.addEventListener('dragover', e=>{e.preventDefault();dropZone.classList.add('drag-over')});
dropZone.addEventListener('dragleave', ()=>dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e=>{e.preventDefault();dropZone.classList.remove('drag-over');const f=e.dataTransfer.files[0];if(f)readFile(f)});
fileInput.addEventListener('change', e=>{if(e.target.files[0])readFile(e.target.files[0])});

function readFile(file) {
  const r = new FileReader();
  r.onload = e => {
    try { eventsData=JSON.parse(e.target.result); onLoaded(file.name); }
    catch(err) { document.getElementById('load-status').textContent='✗ 解析失敗: '+err.message; }
  };
  r.readAsText(file);
}
async function loadFromUrl() {
  const url = document.getElementById('url-input').value.trim();
  document.getElementById('load-status').textContent = '載入中...';
  try { const r=await fetch(url); eventsData=await r.json(); onLoaded(url.split('/').pop()); }
  catch(e) { document.getElementById('load-status').textContent='✗ 載入失敗: '+e.message; }
}
function onLoaded(name) {
  const n=eventsData.events.length, noImg=eventsData.events.filter(e=>!e.image).length;
  document.getElementById('load-status').innerHTML=
    `<span style="color:var(--green)">✓ 載入成功：${name}，共 ${n} 個事件</span>`+
    (noImg?`<span style="color:var(--yellow);margin-left:14px">⚠ ${noImg} 個缺少圖片</span>`:'');
  document.getElementById('stat-total').textContent=n;
  ['step-validate','step-missing','step-run'].forEach(id=>document.getElementById(id).classList.remove('hide'));
}

// ══ MISSING LIST ══
function formatYear(y){return y>0?`西元 ${y} 年`:`${Math.abs(y).toLocaleString()} 年前`}
function showMissing() {
  const missing=eventsData.events.filter(e=>!e.image);
  document.getElementById('missing-count').textContent=missing.length?`共 ${missing.length} 個缺圖`:'✓ 全部有圖';
  const listEl=document.getElementById('missing-list');
  if(!missing.length){listEl.innerHTML='<p style="color:var(--green);padding:10px 0">🎉 所有事件都有圖片！</p>';return}
  listEl.innerHTML='';
  missing.forEach(ev=>{
    const item=document.createElement('div'); item.className='missing-item';
    item.innerHTML=`<div class="missing-item-left"><span class="missing-zh">${ev.zh}</span><span class="missing-axis">${ev.axis} · ${formatYear(ev.year)}</span></div>
    <div class="missing-links">
      ${ev.wiki_zh?`<a class="wiki-btn zh" href="${ev.wiki_zh}" target="_blank" rel="noopener">中文</a>`:''}
      ${ev.wiki_en?`<a class="wiki-btn en" href="${ev.wiki_en}" target="_blank" rel="noopener">EN</a>`:''}
      ${!ev.wiki_zh&&!ev.wiki_en?'<span style="font-size:10px;color:var(--red)">無連結</span>':''}
    </div>`;
    listEl.appendChild(item);
  });
}

// ══ IMAGE SOURCES ══
function parseWiki(url) {
  if(!url?.includes('wikipedia.org/wiki/')) return null;
  return { lang:url.split('//')[1].split('.wikipedia')[0], title:decodeURIComponent(url.split('/wiki/')[1].split('#')[0]) };
}

async function fetchNasaCandidates(ev, n=5) {
  try {
    const q=encodeURIComponent(ev.en||ev.zh);
    const r=await fetch(`https://images-api.nasa.gov/search?q=${q}&media_type=image&page_size=${n}`);
    const d=await r.json();
    return (d.collection?.items||[]).slice(0,n).flatMap(item=>{
      const link=item.links?.find(l=>l.rel==='preview');
      if(!link?.href) return [];
      const large=link.href.replace('~thumb.jpg','~orig.jpg').replace('~small.jpg','~large.jpg');
      return [{url:large, label:item.data?.[0]?.title||'NASA', source:'NASA'}];
    });
  } catch(e){ return []; }
}

async function fetchWikidata(ev) {
  const wikiUrl=ev.wiki_en||ev.wiki_zh; if(!wikiUrl) return null;
  const w=parseWiki(wikiUrl); if(!w) return null;
  try {
    const lang=w.lang==='zh'?'zhwiki':'enwiki';
    const p=new URLSearchParams({action:'wbgetentities',sites:lang,titles:w.title,props:'claims',format:'json',origin:'*'});
    const d=await (await fetch(`https://www.wikidata.org/w/api.php?${p}`)).json();
    for(const ent of Object.values(d.entities||{})){
      const fn=ent.claims?.P18?.[0]?.mainsnak?.datavalue?.value;
      if(fn){
        const p2=new URLSearchParams({action:'query',titles:`File:${fn}`,prop:'imageinfo',iiprop:'url',iiurlwidth:'1200',format:'json',origin:'*'});
        const d2=await (await fetch(`https://commons.wikimedia.org/w/api.php?${p2}`)).json();
        for(const pg of Object.values(d2.query?.pages||{})){
          const u=pg.imageinfo?.[0]?.thumburl||pg.imageinfo?.[0]?.url;
          if(u) return {url:u,label:'Wikidata P18',source:'Wikidata'};
        }
      }
    }
  } catch(e){}
  return null;
}

async function fetchWikiThumb(wikiUrl, size=1200) {
  const w=parseWiki(wikiUrl); if(!w) return null;
  try {
    const p=new URLSearchParams({action:'query',titles:w.title,prop:'pageimages',pithumbsize:String(size),format:'json',redirects:'1',origin:'*'});
    const d=await (await fetch(`https://${w.lang}.wikipedia.org/w/api.php?${p}`)).json();
    for(const pg of Object.values(d.query?.pages||{})) if(pg.thumbnail?.source) return pg.thumbnail.source;
  } catch(e){}
  return null;
}

async function fetchWikiOrig(wikiUrl) {
  const w=parseWiki(wikiUrl); if(!w) return null;
  try {
    const p=new URLSearchParams({action:'query',titles:w.title,prop:'pageimages',piprop:'original',format:'json',redirects:'1',origin:'*'});
    const d=await (await fetch(`https://${w.lang}.wikipedia.org/w/api.php?${p}`)).json();
    for(const pg of Object.values(d.query?.pages||{})) if(pg.original?.source) return pg.original.source;
  } catch(e){}
  return null;
}

const delay=ms=>new Promise(r=>setTimeout(r,ms));

// ══ URL 清理 + 驗證 ══

// 把不穩定的 Wikimedia SVG縮圖URL 轉成更穩定的格式
function sanitizeImageUrl(url) {
  if (!url) return url;

  // 問題格式: .../thumb/x/xx/File.svg/640px-File.svg.png
  // 這種 SVG 縮圖 URL 不穩定，改用更大尺寸或原始格式
  if (url.includes('.svg/') && url.endsWith('.svg.png')) {
    // 把寬度改為 1200px 並嘗試更穩定的路徑
    url = url.replace(/\/\d+px-/, '/1200px-');
    return url;
  }

  // 其他縮圖：確保寬度夠大（至少 800px）
  if (url.includes('/thumb/') && url.match(/\/\d+px-/)) {
    const w = parseInt(url.match(/\/(\d+)px-/)[1]);
    if (w < 640) {
      url = url.replace(/\/\d+px-/, '/1200px-');
    }
  }

  return url;
}

// 實際測試圖片能否載入（帶 timeout）
function testImageLoad(url, timeoutMs=5000) {
  return new Promise(resolve => {
    if (!url) { resolve(false); return; }
    const img = new Image();
    const timer = setTimeout(() => { img.src=''; resolve(false); }, timeoutMs);
    img.onload  = () => { clearTimeout(timer); resolve(true); };
    img.onerror = () => { clearTimeout(timer); resolve(false); };
    img.src = url;
  });
}

// Search Wikipedia by title (fallback when no wiki URL)
async function fetchWikiByTitle(title, lang='en') {
  if (!title) return null;
  try {
    const p = new URLSearchParams({
      action:'query', titles:title, prop:'pageimages',
      pithumbsize:'1200', piprop:'original|thumbnail',
      format:'json', redirects:'1', origin:'*'
    });
    const d = await (await fetch(`https://${lang}.wikipedia.org/w/api.php?${p}`)).json();
    for (const pg of Object.values(d.query?.pages||{})) {
      if (pg.pageid === -1) continue; // page not found
      const url = pg.original?.source || pg.thumbnail?.source;
      if (url) return sanitizeImageUrl(url);
    }
  } catch(e) {}
  return null;
}

// Fetch ALL candidates from all sources simultaneously
async function fetchAllCandidates(ev, zhFirst) {
  const wikiUrls=(zhFirst?[ev.wiki_zh,ev.wiki_en]:[ev.wiki_en,ev.wiki_zh]).filter(Boolean);
  const candidates=[];
  const seen=new Set();
  const add=(c)=>{ if(c?.url && !seen.has(c.url)){seen.add(c.url);candidates.push(c);} };

  const isNaturalSci=['astronomy','geology','biology'].includes(ev.category);

  const tasks=[];
  // NASA for science events
  if(isNaturalSci) tasks.push(fetchNasaCandidates(ev,4).then(arr=>arr.forEach(add)));
  // Wikidata P18
  tasks.push(fetchWikidata(ev).then(r=>{ if(r) r.url=sanitizeImageUrl(r.url); add(r); }));
  // Wiki pageimages from known URLs
  tasks.push(...wikiUrls.map(u=>fetchWikiThumb(u).then(url=>{
    url=sanitizeImageUrl(url);
    add(url?{url,label:'Wiki縮圖('+parseWiki(u)?.lang+')',source:'Wiki-Thumb'}:null);
  })));
  tasks.push(...wikiUrls.map(u=>fetchWikiOrig(u).then(url=>{
    url=sanitizeImageUrl(url);
    add(url?{url,label:'Wiki原圖('+parseWiki(u)?.lang+')',source:'Wiki-Orig'}:null);
  })));
  // Fallback: search by event name on Wikipedia (en + zh)
  // This helps events like 三十年戰爭 that have wiki URLs but also catches others
  if (ev.en) tasks.push(fetchWikiByTitle(ev.en,'en').then(url=>{
    url=sanitizeImageUrl(url);
    add(url?{url,label:'Wiki搜尋(en: '+ev.en+')',source:'Wiki-Search'}:null);
  }));
  if (ev.zh) tasks.push(fetchWikiByTitle(ev.zh,'zh').then(url=>{
    url=sanitizeImageUrl(url);
    add(url?{url,label:'Wiki搜尋(zh: '+ev.zh+')',source:'Wiki-Search'}:null);
  }));

  await Promise.allSettled(tasks);
  return candidates;
}

// ══ PICKER ══
let _pickerResolve=null;
let _selectedPickerUrl=null;

function showPicker(ev, candidates) {
  return new Promise(resolve=>{
    _pickerResolve=resolve;
    _selectedPickerUrl=null;

    document.getElementById('picker-title').textContent=ev.zh+(ev.en?' — '+ev.en:'');
    document.getElementById('picker-meta').textContent=
      `${ev.axis} · ${formatYear(ev.year)} · 共找到 ${candidates.length} 張候選圖片`;
    document.getElementById('picker-url-input').value='';
    document.getElementById('picker-custom-preview').style.display='none';
    document.getElementById('picker-status').textContent='';

    const grid=document.getElementById('picker-grid');
    grid.innerHTML='';

    // Current image if any
    if(ev.image){
      const cur=document.createElement('div'); cur.className='pick-item';
      cur.innerHTML=`<img src="${ev.image}" onerror="this.src='data:image/svg+xml,<svg xmlns=\\'http://www.w3.org/2000/svg\\'/>'" style="height:130px;object-fit:cover;width:100%">
        <div class="pick-label"><span style="color:var(--yellow)">★ 現有圖片</span><br><span class="pick-source">保留原本</span></div>`;
      cur.addEventListener('click',()=>selectPickerItem(cur,ev.image));
      grid.appendChild(cur);
    }

    candidates.forEach(c=>{
      const item=document.createElement('div'); item.className='pick-item';
      item.dataset.url=c.url;
      const isSvgThumb = c.url.includes('.svg.png') || c.url.includes('.svg/');
      const warn = isSvgThumb ? '<span style="font-size:9px;color:var(--yellow);margin-left:4px">⚠ SVG</span>' : '';
      item.innerHTML=`<img src="${c.url}" onerror="this.parentElement.classList.add('img-broken');this.parentElement.querySelector('img').style.display='none'" style="height:130px;object-fit:cover;width:100%">
        <div class="pick-label"><span style="color:var(--text)">${c.label||c.source}</span>${warn}<br>
        <span class="pick-source">${c.source}</span></div>`;
      item.addEventListener('click',()=>selectPickerItem(item,c.url));
      grid.appendChild(item);
    });

    // "None" option
    const none=document.createElement('div'); none.className='pick-item pick-none';
    none.innerHTML='<span style="font-size:20px">🚫</span><span>略過 / 不設圖片</span>';
    none.addEventListener('click',()=>{selectPickerItem(none,null);document.getElementById('picker-confirm').textContent='✓ 確認略過';});
    grid.appendChild(none);

    document.getElementById('picker-overlay').classList.remove('hide');
    document.getElementById('picker-confirm').textContent='✓ 使用選取的圖片';
  });
}

function selectPickerItem(el, url) {
  document.querySelectorAll('.pick-item').forEach(i=>i.classList.remove('selected'));
  el.classList.add('selected');
  _selectedPickerUrl=url;
  document.getElementById('picker-status').textContent=url?'已選取':'已選擇略過';
  // Also clear custom input if clicking grid
  if(!el.closest('#picker-custom')){
    document.getElementById('picker-url-input').value='';
    document.getElementById('picker-custom-preview').style.display='none';
  }
}

function previewCustom() {
  const url=document.getElementById('picker-url-input').value.trim();
  const img=document.getElementById('picker-custom-preview');
  if(!url){img.style.display='none';return;}
  img.src=url; img.style.display='block';
  _selectedPickerUrl=url;
  document.querySelectorAll('.pick-item').forEach(i=>i.classList.remove('selected'));
}

async function pickerConfirm() {
  // Check custom input first
  const customUrl = document.getElementById('picker-url-input').value.trim();
  if (customUrl) _selectedPickerUrl = sanitizeImageUrl(customUrl);

  if (!_selectedPickerUrl) {
    // Nothing selected — treat as skip
    document.getElementById('picker-overlay').classList.add('hide');
    if (_pickerResolve) _pickerResolve({action:'skip'});
    _pickerResolve = null;
    return;
  }

  // Validate: test if image actually loads
  const statusEl = document.getElementById('picker-status');
  statusEl.textContent = '⏳ 驗證圖片中...';
  statusEl.style.color = 'var(--muted)';
  document.getElementById('picker-confirm').disabled = true;

  const ok = await testImageLoad(_selectedPickerUrl);
  document.getElementById('picker-confirm').disabled = false;

  if (!ok) {
    statusEl.style.color = 'var(--red)';
    statusEl.textContent = '⚠ 此圖片無法載入！請重新選擇或輸入其他 URL';
    return; // Don't close picker, let user pick again
  }

  statusEl.style.color = 'var(--green)';
  statusEl.textContent = '✓ 圖片驗證成功';

  document.getElementById('picker-overlay').classList.add('hide');
  if (_pickerResolve) _pickerResolve({action:'set', url: _selectedPickerUrl});
  _pickerResolve = null;
}
function pickerSkip() {
  document.getElementById('picker-overlay').classList.add('hide');
  if(_pickerResolve) _pickerResolve({action:'skip'});
  _pickerResolve=null;
}
function pickerKeep() {
  document.getElementById('picker-overlay').classList.add('hide');
  if(_pickerResolve) _pickerResolve({action:'keep'});
  _pickerResolve=null;
}

// ══ VALIDATE EXISTING IMAGES ══
let _validateStop = false;
let _brokenEvents = [];

async function validateExistingImages() {
  if (!eventsData) return;
  _validateStop = false;
  _brokenEvents = [];
  const withImg = eventsData.events.filter(e => e.image);
  const total = withImg.length;

  document.getElementById('btn-validate').disabled = true;
  document.getElementById('btn-validate-stop').style.display = '';
  document.getElementById('validate-progress').style.display = '';
  document.getElementById('validate-broken-wrap').style.display = 'none';
  document.getElementById('validate-status').textContent = `檢查中... 0 / ${total}`;

  const BATCH = 8; // parallel checks per batch
  for (let i = 0; i < withImg.length; i += BATCH) {
    if (_validateStop) break;
    const batch = withImg.slice(i, Math.min(i+BATCH, withImg.length));
    await Promise.all(batch.map(async ev => {
      const ok = await testImageLoad(ev.image, 6000);
      if (!ok) _brokenEvents.push(ev);
    }));
    const done = Math.min(i + BATCH, withImg.length);
    const pct = Math.round(done / total * 100);
    document.getElementById('validate-fill').style.width = pct + '%';
    document.getElementById('validate-text').textContent = `${done} / ${total}`;
    document.getElementById('validate-status').textContent =
      `檢查中... ${done} / ${total}${_brokenEvents.length ? `　⚠ 已發現 ${_brokenEvents.length} 個失效` : ''}`;
  }

  document.getElementById('btn-validate').disabled = false;
  document.getElementById('btn-validate-stop').style.display = 'none';
  document.getElementById('validate-fill').style.width = '100%';

  if (_brokenEvents.length === 0) {
    document.getElementById('validate-status').textContent = `✓ 全部 ${total} 個圖片連結有效！`;
    return;
  }

  document.getElementById('validate-status').textContent =
    `完成：${total} 個中發現 ${_brokenEvents.length} 個失效連結`;
  renderBrokenList();
}

function validateStop() { _validateStop = true; }

function renderBrokenList() {
  const listEl = document.getElementById('validate-broken-list');
  const countEl = document.getElementById('validate-broken-count');
  const wrap = document.getElementById('validate-broken-wrap');
  countEl.textContent = `⚠ 發現 ${_brokenEvents.length} 個失效圖片連結`;
  listEl.innerHTML = '';
  _brokenEvents.forEach(ev => {
    const item = document.createElement('div');
    item.className = 'broken-item';
    item.id = 'broken-' + ev.id;
    item.innerHTML = `
      <img class="broken-thumb" src="${ev.image}" onerror="this.style.opacity='0.2'">
      <div class="broken-info">
        <div class="broken-zh">${ev.zh}</div>
        <div class="broken-url">${ev.image}</div>
      </div>
      <div class="broken-actions">
        <button class="btn-clear" onclick="clearOneBroken('${ev.id}')">清除</button>
      </div>`;
    listEl.appendChild(item);
  });
  wrap.style.display = '';
}

function clearOneBroken(id) {
  const ev = eventsData.events.find(e => e.id === id);
  if (ev) { delete ev.image; }
  _brokenEvents = _brokenEvents.filter(e => e.id !== id);
  const item = document.getElementById('broken-' + id);
  if (item) item.remove();
  document.getElementById('validate-broken-count').textContent =
    `⚠ 發現 ${_brokenEvents.length} 個失效圖片連結${_brokenEvents.length===0?' — 已全部清除':''}`;
  if (_brokenEvents.length === 0)
    document.getElementById('validate-status').textContent = '✓ 所有失效連結已清除，記得下載更新後的 JSON';
}

function clearAllBroken() {
  _brokenEvents.forEach(ev => {
    const e = eventsData.events.find(x => x.id === ev.id);
    if (e) delete e.image;
  });
  _brokenEvents = [];
  document.getElementById('validate-broken-list').innerHTML =
    '<p style="color:var(--green);padding:10px">✓ 已清除所有失效連結，記得下載更新後的 JSON</p>';
  document.getElementById('validate-broken-count').textContent = '✓ 全部清除完成';
  document.getElementById('validate-status').textContent = '✓ 所有失效連結已清除，記得下載更新後的 JSON';
  document.getElementById('step-download').classList.remove('hide');
}

// ══ LOG ══
function log(msg,cls='log-info'){
  const el=document.getElementById('log');
  el.innerHTML+=`<div class="${cls}">${msg}</div>`;
  el.scrollTop=el.scrollHeight;
}

// ══ RUN UPDATE ══
async function runUpdate() {
  if(!eventsData) return;
  shouldStop=false; statOk=statManual=statFail=statSkip=0; results=[];
  document.getElementById('log').innerHTML='';
  document.getElementById('btn-run').disabled=true;
  document.getElementById('btn-stop').style.display='';
  document.getElementById('progress-wrap').style.display='';
  document.getElementById('step-download').classList.add('hide');

  const overwrite=document.getElementById('chk-overwrite').checked;
  const zhFirst=document.getElementById('chk-zh').checked;
  const evList=eventsData.events;

  for(let i=0;i<evList.length;i++){
    if(shouldStop){log('— 已停止 —','log-warn');break;}
    const ev=evList[i];
    const pct=Math.round(i/evList.length*100);
    document.getElementById('progress-fill').style.width=pct+'%';
    document.getElementById('progress-text').textContent=`${i+1} / ${evList.length}  ${ev.zh}`;

    // Has image + not overwriting → skip entirely
    if(ev.image && !overwrite){
      statSkip++; document.getElementById('stat-skip').textContent=statSkip;
      results.push({ev,status:'skip',img:ev.image});
      continue;
    }

    if(!ev.wiki_zh && !ev.wiki_en && !ev.en && !ev.zh){
      statFail++; document.getElementById('stat-fail').textContent=statFail;
      log(`✗ ${ev.zh}（無任何來源可搜尋）`,'log-fail');
      results.push({ev,status:'fail',img:null});
      continue;
    }

    log(`⏳ ${ev.zh} 抓取中...`,'log-info');

    const candidates=await fetchAllCandidates(ev,zhFirst);

    if(candidates.length===0){
      statFail++; document.getElementById('stat-fail').textContent=statFail;
      log(`✗ ${ev.zh}（找不到任何圖片）`,'log-fail');
      results.push({ev,status:'fail',img:null});
      continue;
    }

    if(candidates.length===1 && !ev.image){
      // Only one candidate and no existing image → auto-apply
      ev.image=candidates[0].url;
      statOk++; document.getElementById('stat-ok').textContent=statOk;
      log(`✓ ${ev.zh} <span style="color:#86efac;font-size:9px">[自動 · ${candidates[0].source}]</span>`,'log-auto');
      results.push({ev,status:'auto',img:ev.image});
    } else {
      // Multiple candidates OR has existing image → show picker
      log(`🔍 ${ev.zh}（${candidates.length} 張候選，請選擇）`,'log-info');
      const choice=await showPicker(ev,candidates);

      if(choice.action==='set' && choice.url){
        ev.image=choice.url;
        statManual++; document.getElementById('stat-manual').textContent=statManual;
        log(`✓ ${ev.zh} <span style="color:var(--accent);font-size:9px">[手動選取]</span>`,'log-ok');
        results.push({ev,status:'manual',img:ev.image});
      } else if(choice.action==='keep'){
        log(`— ${ev.zh}（保留原圖）`,'log-info');
        results.push({ev,status:'kept',img:ev.image});
      } else {
        statFail++; document.getElementById('stat-fail').textContent=statFail;
        log(`— ${ev.zh}（略過）`,'log-info');
        results.push({ev,status:'skipped',img:null});
      }
    }
    await delay(30);
  }

  document.getElementById('progress-fill').style.width='100%';
  document.getElementById('progress-text').textContent='完成！';
  document.getElementById('btn-run').disabled=false;
  document.getElementById('btn-stop').style.display='none';
  log(`─── 完成：自動 ${statOk} · 手選 ${statManual} · 失敗/略過 ${statFail} · 有圖略過 ${statSkip} ───`,'log-warn');
  document.getElementById('step-download').classList.remove('hide');
  showMissing();
}

function stopUpdate(){shouldStop=true;}

// ══ DOWNLOAD ══
function downloadJson(){
  const blob=new Blob([JSON.stringify(eventsData,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='events.json'; a.click();
  URL.revokeObjectURL(a.href);
}

function toggleTable(){
  const wrap=document.getElementById('result-wrap');
  wrap.style.display=wrap.style.display==='none'?'':'none';
  if(wrap.style.display==='none') return;
  const tbody=document.getElementById('result-body'); tbody.innerHTML='';
  results.filter(r=>r.status!=='skip').forEach(({ev,status,img})=>{
    const badge=status==='auto'?'<span class="badge badge-ok">自動</span>':
                status==='manual'?'<span class="badge badge-manual">手選</span>':
                status==='kept'?'<span class="badge badge-skip">保留</span>':
                '<span class="badge badge-skip">略過</span>';
    const imgHtml=img?`<img src="${img}" onerror="this.style.display='none'">`:'—';
    const urlHtml=img?`<span style="color:var(--muted);word-break:break-all;font-size:10px">${img.substring(0,70)}…</span>`:'';
    tbody.innerHTML+=`<tr><td>${ev.zh}</td><td>${badge}</td><td>${imgHtml}</td><td>${urlHtml}</td></tr>`;
  });
}
