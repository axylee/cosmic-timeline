<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Cosmic Timeline — 圖片更新工具</title>
<style>
  :root {
    --bg: #05080f;
    --surface: #0c1020;
    --border: rgba(255,255,255,0.08);
    --text: #ddd8c8;
    --muted: rgba(221,216,200,0.45);
    --accent: #60a5fa;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Noto Sans TC', 'Noto Sans', sans-serif;
    font-size: 13px; min-height: 100vh;
    padding: 32px 24px;
  }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 6px; color: #fff; }
  .subtitle { color: var(--muted); font-size: 12px; margin-bottom: 28px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 20px;
  }
  .card-title { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; }

  .row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
  label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 5px; }
  input, select {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 6px; color: var(--text);
    padding: 8px 12px; font-size: 13px;
    font-family: inherit; outline: none;
    transition: border-color .15s;
  }
  input:focus, select:focus { border-color: rgba(255,255,255,0.25); }
  input[type=text] { width: 380px; }

  button {
    padding: 9px 20px; border-radius: 8px; border: none;
    font-family: inherit; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all .15s; white-space: nowrap;
  }
  .btn-primary { background: rgba(96,165,250,0.2); color: var(--accent); border: 1px solid rgba(96,165,250,0.3); }
  .btn-primary:hover { background: rgba(96,165,250,0.35); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-success { background: rgba(52,211,153,0.2); color: var(--green); border: 1px solid rgba(52,211,153,0.3); }
  .btn-success:hover { background: rgba(52,211,153,0.35); }
  .btn-success:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

  /* Progress */
  .progress-wrap { margin: 14px 0; }
  .progress-bar-bg {
    background: rgba(255,255,255,0.06); border-radius: 4px; height: 6px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; background: var(--accent); border-radius: 4px;
    transition: width 0.3s ease; width: 0%;
  }
  .progress-text { font-size: 11px; color: var(--muted); margin-top: 6px; }

  /* Stats */
  .stats { display: flex; gap: 20px; margin: 14px 0; flex-wrap: wrap; }
  .stat { text-align: center; }
  .stat-num { font-size: 24px; font-weight: 300; }
  .stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .stat-num.green { color: var(--green); }
  .stat-num.red { color: var(--red); }
  .stat-num.yellow { color: var(--yellow); }

  /* Log */
  #log {
    height: 320px; overflow-y: auto; padding: 12px;
    background: rgba(0,0,0,0.3); border-radius: 8px;
    font-family: 'Courier New', monospace; font-size: 11px;
    line-height: 1.7;
  }
  .log-ok   { color: var(--green); }
  .log-fail { color: var(--red); }
  .log-info { color: var(--muted); }
  .log-warn { color: var(--yellow); }

  /* Result table */
  #result-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  #result-table th {
    text-align: left; padding: 8px 10px;
    color: var(--muted); font-weight: 400; font-size: 10px;
    letter-spacing: 0.08em; text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }
  #result-table td {
    padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.04);
    vertical-align: middle;
  }
  #result-table img { width: 48px; height: 32px; object-fit: cover; border-radius: 4px; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px;
  }
  .badge-ok   { background: rgba(52,211,153,0.15); color: var(--green); }
  .badge-fail { background: rgba(248,113,113,0.15); color: var(--red); }
  .badge-skip { background: rgba(255,255,255,0.06); color: var(--muted); }

  #drop-zone {
    border: 2px dashed rgba(255,255,255,0.12);
    border-radius: 10px; padding: 28px; text-align: center;
    color: var(--muted); cursor: pointer; transition: all .2s;
    margin-bottom: 14px;
  }
  #drop-zone:hover, #drop-zone.drag-over {
    border-color: var(--accent); color: var(--accent);
    background: rgba(96,165,250,0.05);
  }
  #drop-zone input { display: none; }
  .spacer { height: 8px; }
  .hide { display: none !important; }
</style>
</head>
<body>
<h1>🌌 Cosmic Timeline — 圖片更新工具</h1>
<p class="subtitle">自動從 Wikipedia 頁面抓取圖片 URL，更新 events.json</p>

<!-- Step 1: Load JSON -->
<div class="card" id="step-load">
  <div class="card-title">步驟 1 — 載入 events.json</div>
  <div id="drop-zone" onclick="document.getElementById('file-input').click()">
    <input type="file" id="file-input" accept=".json">
    📂 點擊選擇檔案，或拖曳 events.json 到這裡
  </div>
  <div class="row">
    <div>
      <label>或從 GitHub 直接載入</label>
      <input type="text" id="url-input" value="https://raw.githubusercontent.com/axylee/cosmic-timeline/main/data/events.json" placeholder="JSON URL">
    </div>
    <button class="btn-primary" onclick="loadFromUrl()">從 URL 載入</button>
  </div>
  <div class="spacer"></div>
  <div id="load-status" class="log-info"></div>
</div>

<!-- Step 2: Run -->
<div class="card hide" id="step-run">
  <div class="card-title">步驟 2 — 抓取圖片</div>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">總事件</div></div>
    <div class="stat"><div class="stat-num green" id="stat-ok">0</div><div class="stat-label">成功</div></div>
    <div class="stat"><div class="stat-num red" id="stat-fail">0</div><div class="stat-label">失敗</div></div>
    <div class="stat"><div class="stat-num yellow" id="stat-skip">0</div><div class="stat-label">略過</div></div>
  </div>

  <div class="row" style="margin-bottom:12px;">
    <button class="btn-primary" id="btn-run" onclick="runUpdate()">▶ 開始更新圖片</button>
    <button class="btn-ghost" id="btn-stop" onclick="stopUpdate()" style="display:none">⬛ 停止</button>
    <label style="margin:0;display:flex;align-items:center;gap:6px;cursor:pointer;">
      <input type="checkbox" id="chk-overwrite"> 覆蓋已有的圖片
    </label>
    <label style="margin:0;display:flex;align-items:center;gap:6px;cursor:pointer;">
      <input type="checkbox" id="chk-zh" checked> 優先用中文 Wikipedia
    </label>
  </div>

  <div class="progress-wrap" id="progress-wrap" style="display:none">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
    <div class="progress-text" id="progress-text"></div>
  </div>

  <div id="log"></div>
</div>

<!-- Step 3: Download -->
<div class="card hide" id="step-download">
  <div class="card-title">步驟 3 — 下載更新後的 JSON</div>
  <div class="row">
    <button class="btn-success" onclick="downloadJson()">⬇ 下載 events.json</button>
    <button class="btn-ghost" onclick="showTable()">📋 查看結果清單</button>
  </div>
  <div class="spacer"></div>
  <div id="result-wrap" style="display:none;overflow-x:auto;">
    <table id="result-table">
      <thead><tr><th>事件</th><th>狀態</th><th>圖片預覽</th><th>URL</th></tr></thead>
      <tbody id="result-body"></tbody>
    </table>
  </div>
</div>

<script>
let eventsData = null;
let results = [];
let shouldStop = false;

// ── Drag & drop ──
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) readFile(file);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) readFile(e.target.files[0]); });

function readFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      eventsData = JSON.parse(e.target.result);
      onLoaded(file.name);
    } catch(err) {
      document.getElementById('load-status').textContent = '✗ JSON 解析失敗: ' + err.message;
    }
  };
  reader.readAsText(file);
}

async function loadFromUrl() {
  const url = document.getElementById('url-input').value.trim();
  document.getElementById('load-status').textContent = '載入中...';
  try {
    const res = await fetch(url);
    eventsData = await res.json();
    onLoaded(url.split('/').pop());
  } catch(err) {
    document.getElementById('load-status').textContent = '✗ 載入失敗: ' + err.message;
  }
}

function onLoaded(name) {
  const n = eventsData.events.length;
  document.getElementById('load-status').innerHTML = `<span style="color:var(--green)">✓ 載入成功：${name}，共 ${n} 個事件</span>`;
  document.getElementById('stat-total').textContent = n;
  document.getElementById('step-run').classList.remove('hide');
}

// ── Wikipedia API ──
async function getWikiImage(wikiUrl) {
  if (!wikiUrl || !wikiUrl.includes('wikipedia.org/wiki/')) return null;
  try {
    const lang  = wikiUrl.split('//')[1].split('.wikipedia')[0];
    const title = decodeURIComponent(wikiUrl.split('/wiki/')[1].split('#')[0]);
    const params = new URLSearchParams({
      action: 'query', titles: title,
      prop: 'pageimages', pithumbsize: '800',
      format: 'json', redirects: '1', origin: '*'
    });
    const res = await fetch(`https://${lang}.wikipedia.org/w/api.php?${params}`);
    const data = await res.json();
    for (const page of Object.values(data.query?.pages || {})) {
      if (page.thumbnail?.source) return page.thumbnail.source;
    }
  } catch(e) {}
  return null;
}

// ── Run update ──
let statOk = 0, statFail = 0, statSkip = 0;

function log(msg, cls='log-info') {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

async function runUpdate() {
  if (!eventsData) return;
  shouldStop = false;
  statOk = statFail = statSkip = 0;
  results = [];
  document.getElementById('log').innerHTML = '';
  document.getElementById('btn-run').disabled = true;
  document.getElementById('btn-stop').style.display = '';
  document.getElementById('progress-wrap').style.display = '';
  document.getElementById('step-download').classList.add('hide');

  const overwrite = document.getElementById('chk-overwrite').checked;
  const zhFirst   = document.getElementById('chk-zh').checked;
  const events    = eventsData.events;

  for (let i = 0; i < events.length; i++) {
    if (shouldStop) { log('— 已停止 —', 'log-warn'); break; }

    const ev = events[i];
    const pct = Math.round((i / events.length) * 100);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-text').textContent = `${i + 1} / ${events.length}`;

    // Skip if has image and not overwriting
    if (ev.image && !overwrite) {
      statSkip++;
      document.getElementById('stat-skip').textContent = statSkip;
      results.push({ ev, status: 'skip', img: ev.image });
      continue;
    }

    const urls = zhFirst
      ? [ev.wiki_zh, ev.wiki_en].filter(Boolean)
      : [ev.wiki_en, ev.wiki_zh].filter(Boolean);

    let img = null;
    for (const url of urls) {
      img = await getWikiImage(url);
      if (img) break;
      await new Promise(r => setTimeout(r, 80)); // polite delay
    }

    if (img) {
      ev.image = img;
      statOk++;
      document.getElementById('stat-ok').textContent = statOk;
      log(`✓ <span style="color:var(--text)">${ev.zh}</span>`, 'log-ok');
      results.push({ ev, status: 'ok', img });
    } else {
      statFail++;
      document.getElementById('stat-fail').textContent = statFail;
      log(`✗ ${ev.zh}（無圖片）`, 'log-fail');
      results.push({ ev, status: 'fail', img: ev.image || null });
    }

    await new Promise(r => setTimeout(r, 50));
  }

  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-text').textContent = '完成！';
  document.getElementById('btn-run').disabled = false;
  document.getElementById('btn-stop').style.display = 'none';
  log(`─── 完成：成功 ${statOk}，失敗 ${statFail}，略過 ${statSkip} ───`, 'log-warn');
  document.getElementById('step-download').classList.remove('hide');
}

function stopUpdate() { shouldStop = true; }

// ── Download ──
function downloadJson() {
  const blob = new Blob([JSON.stringify(eventsData, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'events.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── Result table ──
function showTable() {
  const wrap = document.getElementById('result-wrap');
  wrap.style.display = wrap.style.display === 'none' ? '' : 'none';
  if (wrap.style.display === 'none') return;
  const tbody = document.getElementById('result-body');
  tbody.innerHTML = '';
  for (const { ev, status, img } of results) {
    const badge = status === 'ok'   ? '<span class="badge badge-ok">✓ 成功</span>' :
                  status === 'fail' ? '<span class="badge badge-fail">✗ 失敗</span>' :
                                     '<span class="badge badge-skip">略過</span>';
    const imgHtml = img
      ? `<img src="${img}" onerror="this.style.display='none'">`
      : '<span style="color:var(--muted)">—</span>';
    const urlHtml = img
      ? `<span style="color:var(--muted);word-break:break-all;font-size:10px">${img.substring(0,80)}…</span>`
      : '';
    tbody.innerHTML += `<tr>
      <td>${ev.zh}</td>
      <td>${badge}</td>
      <td>${imgHtml}</td>
      <td>${urlHtml}</td>
    </tr>`;
  }
}
</script>
</body>
</html>
